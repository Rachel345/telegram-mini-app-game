<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кріпто-тренажер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .stats {
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        .level-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #334155;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .level-card:active {
            transform: scale(0.98);
        }
        .level-card.locked {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .level-card h3 { margin: 0 0 10px 0; color: #38bdf8; }
        .level-card p { margin: 0; font-size: 0.9em; color: #94a3b8; }
        .star-icon { color: #fbbf24; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Кріпто-тренажер</h1>
        <div class="stats">
            <span class="star-icon">⭐</span> Зірок: <span id="star-count">0</span>
        </div>
    </div>

    <div class="menu-grid">
        <div class="level-card" onclick="goToLevel('easy')">
            <h3>Легкий: Шифр Цезаря</h3>
            <p>Вивчіть основи зсуву алфавіту</p>
        </div>
        
        <div class="level-card" onclick="goToLevel('medium')">
            <h3>Середній: Шифр Атбаш</h3>
            <p>Дзеркальне відображення алфавіту</p>
        </div>

        <div class="level-card locked">
            <h3>Складний: Віженер</h3>
            <p>Скоро у грі...</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function fetchStars() {
            try {
                const response = await fetch(`/get_stars?user_id=${tg.initDataUnsafe.user.id}`);
                const data = await response.json();
                document.getElementById('star-count').innerText = data.stars;
            } catch (e) {
                console.error("Помилка отримання зірок", e);
            }
        }

        // Функція для переходу на рівні з униканням кешу
        function goToLevel(level) {
            const version = Date.now(); // Створюємо унікальний штамп часу
            if (level === 'easy') {
                // Якщо у вас легкий рівень окремим файлом:
                // window.location.href = `easy.html?v=${version}`;
                alert("Легкий рівень в розробці або вбудований");
            } else if (level === 'medium') {
                window.location.href = `medium.html?v=${version}`;
            }
        }

        fetchStars();
    </script>
</body>
</html>
