<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Середній рівень - Кріпто-тренажер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * { box-sizing: border-box; }
      body {
        background-color: #1a1a2e;
        color: #eee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 16px; min-height: 100vh;
      }
      .screen {
        display: none; flex-direction: column; align-items: center; justify-content: flex-start;
        gap: 16px; max-width: 450px; margin: 0 auto;
      }
      .screen.active { display: flex; }
      
      .card {
        background: #16213e;
        border-radius: 16px; padding: 20px; width: 100%; position: relative;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      
      /* Заголовок гри */
      .game-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px; background: #16213e;
        border-radius: 12px; width: 100%; margin-bottom: 8px;
        font-weight: bold;
      }
      
      /* Таймер */
      .timer-container {
        width: 100%; height: 8px; background: rgba(255,255,255,0.1);
        border-radius: 4px; margin-bottom: 15px; overflow: hidden;
      }
      #timer-bar {
        width: 100%; height: 100%; background: #ef4444; transition: width 0.1s linear;
      }

      /* Вибір гри */
      .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; margin-top: 20px; }
      .menu-card {
        background: #16213e; border: 2px solid #2ea6ff; border-radius: 16px;
        padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
      }
      .menu-card:active { transform: scale(0.98); }
      .menu-card h3 { margin: 0 0 8px 0; color: #2ea6ff; }
      .menu-card p { margin: 0; font-size: 14px; opacity: 0.8; }

      /* Віженер стиль */
      .vigenere-input-group { margin-bottom: 15px; width: 100%; }
      .vigenere-input-group label { display: block; font-size: 12px; color: #2ea6ff; margin-bottom: 5px; text-transform: uppercase; }
      .vigenere-input {
        width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 8px; padding: 12px; color: #fff; font-size: 16px; outline: none;
      }
      .vigenere-input:focus { border-color: #2ea6ff; }
      .vigenere-task {
        background: rgba(46, 166, 255, 0.1); border-radius: 12px; padding: 15px;
        margin-bottom: 20px; border-left: 4px solid #2ea6ff;
      }
      .vigenere-task b { color: #facc15; }

      /* Таблиця */
      .table-wrapper {
        width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px;
        background: #0f3460; display: none;
      }
      table { border-collapse: collapse; font-size: 10px; color: #fff; width: 100%; }
      td, th { border: 1px solid rgba(255,255,255,0.1); padding: 4px; text-align: center; min-width: 20px; }
      th { background: #1a1a2e; color: #facc15; }
      .highlight { background: #e94560 !important; color: white; font-weight: bold; }

      /* Кнопки */
      .btn {
        background: #2ea6ff; color: #fff; border: none; border-radius: 12px;
        padding: 14px; width: 100%; font-size: 16px; cursor: pointer; font-weight: bold;
        transition: 0.2s;
      }
      .btn:active { opacity: 0.8; }
      .hint-btn { background: #facc15; color: #000; margin-top: 10px; }
      .back-btn { background: transparent; border: 1px solid #ef4444; color: #ef4444; margin-top: 20px; }
      
      .feedback {
        margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; display: none;
      }
      .feedback.correct { background: rgba(34, 197, 94, 0.2); color: #22c55e; display: block; }
      .feedback.wrong { background: rgba(239, 68, 68, 0.2); color: #ef4444; display: block; }

      /* Game Over Screen */
      .game-over-card {
        background: #16213e; border-radius: 20px; padding: 40px 20px;
        text-align: center; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .game-over-card h2 { font-size: 28px; margin-bottom: 10px; }
      .score-display { font-size: 20px; margin-bottom: 30px; opacity: 0.9; }
      .btn-secondary {
        background: transparent; border: 1px solid #2ea6ff; color: #2ea6ff; margin-top: 15px;
      }
    </style>
  </head>
  <body>

    <!-- Екран вибору гри -->
    <div id="menu-screen" class="screen active">
      <h2 style="margin-top: 20px;">Середній рівень</h2>
      <p style="text-align: center; opacity: 0.8;">Оберіть метод шифрування для тренування:</p>
      
      <div class="menu-grid">
        <div class="menu-card" onclick="startAtbash()">
          <h3>Атбаш</h3>
          <p>Дзеркальний шифр (А ↔ Я)</p>
        </div>
        <div class="menu-card" onclick="startVigenere()">
          <h3>Шифр Віженера</h3>
          <p>Багатоалфавітна заміна з ключем</p>
        </div>
      </div>
      <button class="btn back-btn" onclick="window.location.href='index.html'">Назад в меню</button>
    </div>

    <!-- Ігровий екран Віженера -->
    <div id="vigenere-screen" class="screen">
      <div class="game-header">
        <span>❤️ <span id="v-lives">3</span></span>
        <span style="color: #2ea6ff;">Віженер</span>
        <span>⭐ <span id="v-score">0</span></span>
      </div>

      <div class="card">
        <div class="timer-container"><div id="timer-bar"></div></div>
        
        <div class="vigenere-task">
          Зашифруй слово: <b id="v-target-word">---</b><br>
          Ключове слово: <b id="v-key-word">---</b>
        </div>

        <div class="vigenere-input-group">
          <label>Твоя відповідь</label>
          <input type="text" id="v-answer" class="vigenere-input" placeholder="Введіть результат..." autocomplete="off">
        </div>

        <div id="v-feedback" class="feedback"></div>

        <button id="v-check-btn" class="btn" onclick="checkVigenere()">Перевірити результат</button>
        <button id="v-next-btn" class="btn" style="display:none;" onclick="nextVigenereQuestion()">Наступне питання</button>
        <button id="v-hint-btn" class="btn hint-btn" onclick="toggleHint()">Підказка (Таблиця -10 сек)</button>

        <div id="table-area" class="table-wrapper">
          <table id="tabula-recta"></table>
        </div>
      </div>
    </div>

    <!-- Екран завершення гри -->
    <div id="game-over-screen" class="screen">
        <div class="game-over-card">
            <h2>Гру завершено!</h2>
            <div class="score-display">Ваш результат: <span id="final-score">0</span> ⭐</div>
            <button class="btn" onclick="location.reload()">До вибору рівнів</button>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">В головне меню</button>
        </div>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.expand();
      
      const userId = tg.initDataUnsafe?.user?.id || 0;
      const UKR_ALPHABET = "АБВГҐДЕЄЖЗИІЇЙКЛМНОПРСТУФХЦЧШЩЬЮЯ";
      const V_WORDS = ["ПРИВІТ", "ЗАХИСТ", "ПАРОЛЬ", "КРИПТО", "ДАНІ", "МЕРЕЖА", "КОД"];
      const V_KEYS = ["КЛЮЧ", "БАЗА", "МОВА", "ГРА"];

      let gameState = {
        score: 0,
        lives: 3,
        timeLeft: 60,
        currentWord: "",
        currentKey: "",
        correctAnswer: "",
        hintUsed: false,
        timer: null
      };

      // Функція шифрування
      function vigenereEncrypt(text, key) {
        let result = "";
        text = text.toUpperCase();
        key = key.toUpperCase();
        let keyIndex = 0;

        for (let i = 0; i < text.length; i++) {
          let char = text[i];
          let charIdx = UKR_ALPHABET.indexOf(char);
          
          if (charIdx !== -1) {
            let keyChar = key[keyIndex % key.length];
            let keyIdx = UKR_ALPHABET.indexOf(keyChar);
            
            let newIdx = (charIdx + keyIdx) % UKR_ALPHABET.length;
            result += UKR_ALPHABET[newIdx];
            keyIndex++;
          } else {
            result += char;
          }
        }
        return result;
      }

      function startVigenere() {
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('vigenere-screen').classList.add('active');
        gameState.score = 0;
        gameState.lives = 3;
        updateUI();
        createTabulaRecta();
        nextVigenereQuestion();
      }

      function nextVigenereQuestion() {
        if (gameState.lives <= 0) {
            showGameOver();
            return;
        }

        gameState.currentWord = V_WORDS[Math.floor(Math.random() * V_WORDS.length)];
        gameState.currentKey = V_KEYS[Math.floor(Math.random() * V_KEYS.length)];
        gameState.correctAnswer = vigenereEncrypt(gameState.currentWord, gameState.currentKey);
        gameState.hintUsed = false;
        gameState.timeLeft = 60;

        document.getElementById('v-target-word').textContent = gameState.currentWord;
        document.getElementById('v-key-word').textContent = gameState.currentKey;
        document.getElementById('v-answer').value = "";
        document.getElementById('v-answer').disabled = false;
        document.getElementById('v-feedback').style.display = "none";
        document.getElementById('v-check-btn').style.display = "block";
        document.getElementById('v-next-btn').style.display = "none";
        document.getElementById('table-area').style.display = "none";
        
        startTimer();
      }

      function startTimer() {
        clearInterval(gameState.timer);
        gameState.timer = setInterval(() => {
          gameState.timeLeft -= 0.1;
          let percent = (gameState.timeLeft / 60) * 100;
          document.getElementById('timer-bar').style.width = percent + "%";
          
          if (gameState.timeLeft <= 0) {
            clearInterval(gameState.timer);
            handleError("⏰ Час вийшов!");
          }
        }, 100);
      }

      function toggleHint() {
        if (!gameState.hintUsed) {
            gameState.timeLeft = Math.max(0, gameState.timeLeft - 10);
            gameState.hintUsed = true; // Тепер час зніметься лише один раз
        }
        const table = document.getElementById('table-area');
        table.style.display = table.style.display === "none" ? "block" : "none";
      }

      async function checkVigenere() {
        const userAns = document.getElementById('v-answer').value.trim().toUpperCase();
        const feedback = document.getElementById('v-feedback');

        if (userAns === gameState.correctAnswer) {
          clearInterval(gameState.timer);
          gameState.score += 25;
          feedback.textContent = "✅ Правильно! Ти герой! +25 ⭐";
          feedback.className = "feedback correct";
          document.getElementById('v-check-btn').style.display = "none";
          document.getElementById('v-next-btn').style.display = "block";
          document.getElementById('v-answer').disabled = true;
          updateUI();
          await syncStars(25);
        } else {
          gameState.lives--;
          updateUI();
          if (gameState.lives <= 0) {
            showGameOver();
          } else {
            feedback.textContent = "❌ Неправильно, спробуй ще!";
            feedback.className = "feedback wrong";
          }
        }
      }

      function handleError(msg) {
        gameState.lives--;
        updateUI();
        const feedback = document.getElementById('v-feedback');
        feedback.textContent = msg;
        feedback.className = "feedback wrong";
        document.getElementById('v-check-btn').style.display = "none";
        document.getElementById('v-next-btn').style.display = "block";
        if (gameState.lives <= 0) showGameOver();
      }

      function updateUI() {
        document.getElementById('v-lives').textContent = gameState.lives;
        document.getElementById('v-score').textContent = gameState.score;
      }

      function showGameOver() {
        clearInterval(gameState.timer);
        document.getElementById('vigenere-screen').classList.remove('active');
        document.getElementById('game-over-screen').classList.add('active');
        document.getElementById('final-score').textContent = gameState.score;
      }

      function createTabulaRecta() {
        const table = document.getElementById('tabula-recta');
        let html = "<tr><th></th>";
        
        // Header
        for (let i = 0; i < UKR_ALPHABET.length; i++) {
          html += `<th>${UKR_ALPHABET[i]}</th>`;
        }
        html += "</tr>";

        // Rows
        for (let i = 0; i < UKR_ALPHABET.length; i++) {
          html += `<tr><th>${UKR_ALPHABET[i]}</th>`;
          for (let j = 0; j < UKR_ALPHABET.length; j++) {
            let charIdx = (i + j) % UKR_ALPHABET.length;
            html += `<td>${UKR_ALPHABET[charIdx]}</td>`;
          }
          html += "</tr>";
        }
        table.innerHTML = html;
      }

      async function syncStars(amount) {
        try {
          await fetch('https://anyway-art-mustard.ngrok-free.dev/update_stars', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
            body: JSON.stringify({ user_id: userId, stars: amount })
          });
        } catch (e) { console.error("Sync error", e); }
      }

      // Атбаш (залишаємо логіку, яку ти надсилала раніше, або можемо додати сюди пізніше)
      function startAtbash() {
          alert("Рівень Атбаш запускається (тут буде твій код Атбаш)");
      }

    </script>
  </body>
</html>
