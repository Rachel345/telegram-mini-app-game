<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Середній рівень - Кріпто-тренажер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ГЛОБАЛЬНІ НАЛАШТУВАННЯ */
        * { box-sizing: border-box; }
        body {
            background-color: #0a0a0c !important;
            color: #eee !important;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 16px; min-height: 100vh;
        }
        
        .screen { display: none; flex-direction: column; align-items: center; gap: 16px; max-width: 400px; margin: 0 auto; }
        .screen.active { display: flex; }
        
        /* КАРТКИ */
        .card {
            background: rgba(30, 41, 59, 0.2);
            border: 1px solid rgba(250, 204, 21, 0.3);
            border-radius: 16px; padding: 24px; width: 100%; position: relative;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.1);
        }

        .menu-title { 
            font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; 
            color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
        }
        
        /* ХЕДЕР ГРИ */
        .game-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: rgba(0,0,0,0.5);
            border: 1px solid #facc15; border-radius: 12px; width: 100%; margin-bottom: 8px;
            color: #fff;
        }

        /* ТАЙМЕР */
        .timer-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 3px; margin-bottom: 20px; overflow: hidden;
            border: 1px solid rgba(250, 204, 21, 0.2);
        }
        .timer-bar { width: 100%; height: 100%; background: #facc15; box-shadow: 0 0 10px #facc15; transition: width 0.1s linear; }

        /* ТАБЛИЦІ */
        .vigenere-wrap, .playfair-wrap { 
            width: 100%; overflow-x: auto; margin: 15px 0; border-radius: 8px; 
            background: #000; border: 1px solid #facc15; 
        }
        table { border-collapse: collapse; font-size: 9px; color: #94a3b8; width: 100%; }
        td, th { text-align: center; border: 1px solid #1e293b; text-transform: uppercase; }
        
        /* Стилі Віженера */
        .vigenere-wrap td, .vigenere-wrap th { width: 18px; height: 18px; }
        th { background: #111; color: #facc15; }
        .h-cell { background: #facc15 !important; color: #000 !important; font-weight: bold; box-shadow: inset 0 0 5px #000; }
        .h-line { background: rgba(250, 204, 21, 0.2); color: #fff; }

        /* Стилі Плейфера */
        .playfair-grid td { 
            width: 40px; height: 40px; font-size: 16px; color: #facc15; 
            border: 1px solid rgba(239, 68, 68, 0.5); font-weight: bold;
        }
        .pf-highlight { background: rgba(250, 204, 21, 0.3); color: #fff !important; border: 2px solid #facc15 !important; }

        .pf-info-panel { background: rgba(250, 204, 21, 0.1); padding: 12px; border-radius: 10px; border: 1px solid rgba(250, 204, 21, 0.4); margin-bottom: 15px; text-align: center; }
        .pf-target-word { font-size: 20px; font-weight: bold; color: #fff; letter-spacing: 3px; margin: 5px 0; }
        .pf-progress-bar { font-family: monospace; font-size: 18px; color: #22c55e; min-height: 24px; letter-spacing: 2px; }

        /* ІНПУТИ */
        .input-box { width: 100%; margin-bottom: 15px; }
        .input-box label { display: block; font-size: 12px; color: #facc15; margin-bottom: 5px; text-transform: uppercase; }
        .input-box input {
            width: 100%; background: #000; border: 1px solid #facc15;
            color: #fff; padding: 12px; border-radius: 10px; font-size: 16px;
            box-shadow: inset 0 0 5px rgba(250, 204, 21, 0.2);
            text-transform: uppercase;
        }

        /* КНОПКИ */
        .btn {
            background: rgba(0, 0, 0, 0.6);
            color: #facc15 !important;
            border: 2px solid #facc15;
            border-radius: 12px; padding: 14px; width: 100%; font-size: 16px; cursor: pointer;
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.2);
            transition: all 0.2s ease;
        }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.3; border-color: #444; color: #444 !important; box-shadow: none; cursor: default; }
        
        .btn-outline { border-color: rgba(250, 204, 21, 0.5); color: rgba(250, 204, 21, 0.8) !important; }
        .btn-exit { border-color: #ef4444; color: #ef4444 !important; }
        .btn-danger { background: rgba(239, 68, 68, 0.1) !important; border-color: #ef4444 !important; color: #ef4444 !important; }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }
        .option-btn {
            background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid rgba(250, 204, 21, 0.3);
            border-radius: 12px; padding: 14px; font-size: 16px; cursor: pointer;
        }
        .option-btn.correct { border-color: #facc15; background: rgba(250, 204, 21, 0.1); color: #facc15; }
        .option-btn.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        
        .feedback-box { margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; border: 1px dashed; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <h2 class="menu-title">СЕРЕДНІЙ РІВЕНЬ</h2>
        <div class="card">
            <button class="btn" onclick="initAtbash()">Рівень 1: Атбаш</button>
            <button class="btn" style="margin-top: 12px;" onclick="initVigenere()">Рівень 2: Віженер</button>
            <button class="btn" style="margin-top: 12px;" onclick="initPlayfair()">Рівень 3: Плейфер</button>
            <button class="btn btn-exit" style="margin-top: 24px;" onclick="window.location.href='index.html'">Повернутися в меню</button>
        </div>
    </div>

    <!-- АТБАШ -->
    <div id="atbash-screen" class="screen">
        <div class="game-header">
            <span>❤️ <span id="atbash-lives">5</span></span>
            <span style="font-weight: bold; color: #facc15;">АТБАШ</span>
            <span>⭐ <span id="atbash-score">0</span></span>
        </div>
        <div class="card">
            <div class="timer-container"><div id="atbash-timer-bar" class="timer-bar"></div></div>
            <p style="text-align: center; opacity: 0.8; font-size: 12px;">СИСТЕМА: РОЗШИФРУЙТЕ ТЕРМІН</p>
            <div id="atbash-word" style="font-size: 26px; font-weight: bold; text-align: center; margin: 15px 0; letter-spacing: 2px;">---</div>
            <div id="atbash-options" class="options-grid"></div>
            <div id="atbash-feedback" class="feedback-box" style="display:none;"></div>
            <button id="atbash-next" class="btn" style="display:none; margin-top:10px;" onclick="nextAtbashQuestion()">ДАЛІ</button>
        </div>
        <button class="btn btn-exit" onclick="resetToMenu()">ПЕРЕрвати</button>
    </div>

    <!-- ВІЖЕНЕР -->
    <div id="vigenere-screen" class="screen">
        <div class="game-header">
            <span>❤️ <span id="vig-lives">3</span></span>
            <span style="font-weight: bold; color: #facc15;">ВІЖЕНЕР</span>
            <span>⏱️ <span id="vig-timer-text">60</span>с</span>
        </div>
        <div class="card">
            <div class="input-box">
                <label>ТЕКСТ (M):</label>
                <input type="text" id="vig-m" readonly>
            </div>
            <div class="input-box">
                <label>КЛЮЧ (K):</label>
                <input type="text" id="vig-k" readonly>
            </div>
            <div id="vig-table-area" class="vigenere-wrap" style="display:none;"><table id="tabula-recta"></table></div>
            <div class="input-box">
                <label>РЕЗУЛЬТАТ (C):</label>
                <input type="text" id="vig-answer" placeholder="Введіть код...">
            </div>
            <div id="vig-feedback" class="feedback-box" style="display:none;"></div>
            <button id="vig-check-btn" class="btn" onclick="checkVigenere()">ВЕРИФІКУВАТИ</button>
            <button id="vig-show-ans-btn" class="btn btn-danger" style="display:none;" onclick="showVigenereSolution()">ВІДНОВИТИ ДАНІ</button>
            <button id="vig-next-btn" class="btn" style="display:none; margin-top:10px;" onclick="generateNewVigenereTask()">ДАЛІ</button>
            <button class="btn btn-outline" style="margin-top: 15px; font-size: 12px;" id="hint-btn" onclick="useHint()">ПІДКАЗКА (ТАБЛИЦЯ) -10с</button>
        </div>
        <button class="btn btn-exit" onclick="handleVigenereExit()">ВИЙТИ</button>
    </div>

    <!-- ПЛЕЙФЕР -->
    <div id="playfair-screen" class="screen">
        <div class="game-header">
            <span>❤️ <span id="pf-lives">3</span></span>
            <span style="font-weight: bold; color: #facc15;">ПЛЕЙФЕР</span>
            <span>⭐ <span id="pf-score">0</span></span>
        </div>
        <div class="card">
            <div class="pf-info-panel">
                <div style="font-size: 10px; color: #facc15; opacity: 0.8;">ШИФРУЄМО СЛОВО:</div>
                <div id="pf-target-word-display" class="pf-target-word">---</div>
                <div id="pf-progress-bar" class="pf-progress-bar"></div>
            </div>
            <p id="pf-step-info" style="text-align: center; color: #facc15; font-size: 13px; margin-bottom: 10px;">Крок 1</p>
            <div class="playfair-wrap">
                <table id="pf-matrix-table" class="playfair-grid"></table>
            </div>
            <div id="pf-active-area">
                <div class="input-box" style="text-align: center; margin-top: 15px;">
                    <label>ПОТОЧНА ПАРА:</label>
                    <div id="pf-current-bigram" style="font-size: 28px; font-weight: bold; letter-spacing: 5px; color: #fff;">--</div>
                </div>
                <div class="input-box">
                    <label>ВВЕДІТЬ РЕЗУЛЬТАТ:</label>
                    <input type="text" id="pf-answer" placeholder="2 літери...">
                </div>
                <div id="pf-feedback" class="feedback-box" style="display:none;"></div>
                <button id="pf-check-btn" class="btn" onclick="checkPlayfair()">ПЕРЕВІРИТИ ПАРУ</button>
                <button id="pf-next-btn" class="btn" style="display:none; margin-top:10px;" onclick="nextPlayfairStep()">НАСТУПНИЙ КРОК</button>
            </div>
            <div id="pf-final-block" style="display:none; text-align: center; border: 1px dashed #22c55e; padding: 15px; border-radius: 10px; background: rgba(34, 197, 94, 0.05);">
                <div style="color: #22c55e; font-weight: bold; margin-bottom: 10px;">РІВЕНЬ ПРОЙДЕНО!</div>
                <div id="pf-final-result" style="font-size: 22px; color: #fff; letter-spacing: 3px; font-weight: bold; margin: 5px 0;"></div>
                <button class="btn" style="margin-top: 15px;" onclick="initPlayfair()">ЩЕ РАЗ</button>
                <button class="btn btn-outline" style="margin-top: 10px;" onclick="resetToMenu()">В ТЕРМІНАЛ</button>
            </div>
        </div>
        <button class="btn btn-exit" onclick="resetToMenu()">ВИЙТИ</button>
    </div>

    <!-- ЗАВЕРШЕННЯ -->
    <div id="game-over-screen" class="screen">
        <div class="card" style="text-align: center;">
            <h2 style="color: #ef4444;">ДОСТУП ПРИПИНЕНО</h2>
            <p style="font-size: 18px; margin: 20px 0;">ЗІБРАНО ДАНИХ: <span id="final-score" style="color: #22c55e; font-weight: bold;">0</span> ⭐</p>
            <button class="btn" onclick="resetToMenu()">ПОВТОРНИЙ ВХІД</button>
            <button class="btn btn-outline" style="margin-top: 12px;" onclick="window.location.href='index.html'">ГОЛОВНИЙ ТЕРМІНАЛ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const ALPHABET = "абвгґдеєжзиіїйклмнопрстуфхцчшщьюя";
        const WORDS = ["блокчейн", "алгоритм", "крипто", "захист", "пароль", "мережа", "цифра", "сервер", "майнінг", "ключі", "депозит"];
        const V_KEYS = ["код", "база", "хаб", "біт", "стек"];
        
        let state = { lives: 0, score: 0, timer: null, timeLeft: 0, correctAnswer: "", hintUsed: false, pfStep: 0, pfMatrix: [], pfFinalText: "", pfCurrentWord: "", pfBigrams: [] };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function resetToMenu() {
            clearInterval(state.timer);
            showScreen('menu-screen');
        }

        function gameOver() {
            clearInterval(state.timer);
            document.getElementById('final-score').textContent = state.score;
            showScreen('game-over-screen');
        }

        function handleVigenereExit() {
            if (state.lives <= 0) {
                gameOver();
            } else {
                resetToMenu();
            }
        }

        async function syncStars(points) {
            const userId = tg.initDataUnsafe?.user?.id || 981926714;
            try {
                await fetch('https://anyway-art-mustard.ngrok-free.dev/update_stars', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ user_id: userId, stars: points })
                });
            } catch (e) { console.error(e); }
        }

        // --- АТБАШ ---
        function initAtbash() {
            state.lives = 5; state.score = 0;
            updateAtbashStats();
            showScreen('atbash-screen');
            nextAtbashQuestion();
        }

        function nextAtbashQuestion() {
            if (state.lives <= 0) { gameOver(); return; }
            const word = WORDS[Math.floor(Math.random() * WORDS.length)];
            state.correctAnswer = word;
            document.getElementById('atbash-word').textContent = word.split('').map(c => {
                let i = ALPHABET.indexOf(c.toLowerCase());
                return i < 0 ? c : ALPHABET[ALPHABET.length - 1 - i];
            }).join('');
            document.getElementById('atbash-feedback').style.display = "none";
            document.getElementById('atbash-next').style.display = "none";
            const opts = document.getElementById('atbash-options');
            opts.innerHTML = "";
            let choices = new Set([word]);
            while(choices.size < 4) choices.add(WORDS[Math.floor(Math.random()*WORDS.length)]);
            [...choices].sort(() => Math.random()-0.5).forEach(val => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.textContent = val;
                b.onclick = async () => {
                    document.querySelectorAll('#atbash-options .option-btn').forEach(btn => btn.disabled = true);
                    clearInterval(state.timer);
                    if(val === state.correctAnswer) {
                        b.classList.add('correct');
                        state.score += 3;
                        document.getElementById('atbash-feedback').innerHTML = "ВЕРИФІКАЦІЯ УСПІШНА +3 ⭐";
                        document.getElementById('atbash-feedback').style.color = "#facc15";
                        await syncStars(3);
                    } else {
                        b.classList.add('wrong');
                        state.lives--;
                        document.getElementById('atbash-feedback').innerHTML = `ПОМИЛКА. ДАНІ: ${state.correctAnswer}`;
                        document.getElementById('atbash-feedback').style.color = "#ef4444";
                    }
                    updateAtbashStats();
                    document.getElementById('atbash-feedback').style.display = "block";
                    document.getElementById('atbash-next').style.display = "block";
                };
                opts.appendChild(b);
            });
            startAtbashTimer();
        }

        function startAtbashTimer() {
            state.timeLeft = 150; clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.timeLeft--;
                document.getElementById('atbash-timer-bar').style.width = (state.timeLeft / 1.5) + "%";
                if(state.timeLeft <= 0) { clearInterval(state.timer); state.lives--; updateAtbashStats(); nextAtbashQuestion(); }
            }, 100);
        }

        function updateAtbashStats() {
            document.getElementById('atbash-lives').textContent = state.lives;
            document.getElementById('atbash-score').textContent = state.score;
        }

        // --- ВІЖЕНЕР ---
        function initVigenere() {
            state.lives = 3; state.score = 0; 
            showScreen('vigenere-screen');
            generateNewVigenereTask();
        }

        function generateNewVigenereTask() {
            if(state.lives <= 0) { gameOver(); return; }
            const m = WORDS[Math.floor(Math.random()*WORDS.length)].toUpperCase();
            const k = V_KEYS[Math.floor(Math.random()*V_KEYS.length)].toUpperCase();
            state.correctAnswer = "";
            let kIdx = 0;
            for(let i=0; i<m.length; i++) {
                let ci = ALPHABET.indexOf(m[i].toLowerCase());
                let ki = ALPHABET.indexOf(k[kIdx % k.length].toLowerCase());
                if (ci !== -1) {
                    state.correctAnswer += ALPHABET[(ci + ki) % ALPHABET.length].toUpperCase();
                    kIdx++;
                } else { state.correctAnswer += m[i]; }
            }
            document.getElementById('vig-m').value = m;
            document.getElementById('vig-k').value = k;
            
            const ansInput = document.getElementById('vig-answer');
            ansInput.value = "";
            ansInput.disabled = false;
            
            const fb = document.getElementById('vig-feedback');
            fb.style.display = "none";
            fb.style.borderColor = "#facc15";
            
            document.getElementById('vig-next-btn').style.display = "none";
            document.getElementById('vig-show-ans-btn').style.display = "none";
            document.getElementById('vig-check-btn').style.display = "block";
            document.getElementById('vig-table-area').style.display = "none";
            
            const hintBtn = document.getElementById('hint-btn');
            hintBtn.disabled = false;
            
            if(document.getElementById('tabula-recta').innerHTML !== "") {
                document.querySelectorAll('#tabula-recta td, #tabula-recta th').forEach(el => {
                    el.classList.remove('h-cell', 'h-line');
                });
            }

            state.hintUsed = false; state.timeLeft = 60;
            updateVigStats(); startVigenereTimer();
        }

        function startVigenereTimer() {
            clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.timeLeft--;
                document.getElementById('vig-timer-text').textContent = state.timeLeft;
                if(state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    state.lives--; updateVigStats();
                    
                    document.getElementById('vig-answer').disabled = true;
                    document.getElementById('hint-btn').disabled = true;
                    
                    const fb = document.getElementById('vig-feedback');
                    fb.innerHTML = "ЧАС ВИЧЕРПАНО";
                    fb.style.color = "#ef4444";
                    fb.style.borderColor = "#ef4444";
                    fb.style.display = "block";
                    
                    document.getElementById('vig-check-btn').style.display = "none";
                    document.getElementById('vig-show-ans-btn').style.display = "block";
                }
            }, 1000);
        }

        function buildVigenereTable() {
            const table = document.getElementById('tabula-recta');
            let html = "<tr><th></th>" + ALPHABET.split('').map(c => `<th>${c}</th>`).join('') + "</tr>";
            for(let i=0; i<ALPHABET.length; i++) {
                html += `<tr><th>${ALPHABET[i]}</th>` + ALPHABET.split('').map((_, j) => `<td id="v-${i}-${j}">${ALPHABET[(i+j)%ALPHABET.length]}</td>`).join('') + "</tr>";
            }
            table.innerHTML = html;
        }

        function useHint() {
            if(!state.hintUsed) { state.timeLeft = Math.max(0, state.timeLeft - 10); state.hintUsed = true; }
            document.getElementById('vig-table-area').style.display = (document.getElementById('vig-table-area').style.display === "none") ? "block" : "none";
            if(document.getElementById('tabula-recta').innerHTML === "") buildVigenereTable();
        }

        async function checkVigenere() {
            const ans = document.getElementById('vig-answer').value.trim().toUpperCase();
            const fb = document.getElementById('vig-feedback');
            clearInterval(state.timer);
            
            if(ans === state.correctAnswer) {
                state.score += 5; await syncStars(5);
                fb.innerHTML = "ВІРНО! +5 ⭐";
                fb.style.color = "#facc15";
                fb.style.borderColor = "#facc15";
                fb.style.display = "block";
                document.getElementById('vig-check-btn').style.display = "none";
                document.getElementById('vig-next-btn').style.display = "block";
                document.getElementById('vig-answer').disabled = true;
                document.getElementById('hint-btn').disabled = true;
            } else {
                state.lives--; updateVigStats();
                fb.innerHTML = "ПОМИЛКА";
                fb.style.color = "#ef4444";
                fb.style.borderColor = "#ef4444";
                fb.style.display = "block";
                
                document.getElementById('vig-answer').disabled = true;
                document.getElementById('hint-btn').disabled = true;
                document.getElementById('vig-check-btn').style.display = "none";
                document.getElementById('vig-show-ans-btn').style.display = "block";
            }
        }

        function showVigenereSolution() {
            document.getElementById('vig-answer').value = state.correctAnswer;
            document.getElementById('vig-table-area').style.display = "block";
            if(document.getElementById('tabula-recta').innerHTML === "") buildVigenereTable();
            
            document.querySelectorAll('#tabula-recta td, #tabula-recta th').forEach(c => {
                c.classList.remove('h-cell', 'h-line');
            });

            const mChar = document.getElementById('vig-m').value[0].toLowerCase();
            const kChar = document.getElementById('vig-k').value[0].toLowerCase();
            const ri = ALPHABET.indexOf(mChar);
            const ci = ALPHABET.indexOf(kChar);
            
            if(ri !== -1 && ci !== -1) {
                for(let j=0; j<ALPHABET.length; j++) {
                    document.getElementById(`v-${ri}-${j}`).classList.add('h-line');
                }
                for(let i=0; i<ALPHABET.length; i++) {
                    document.getElementById(`v-${i}-${ci}`).classList.add('h-line');
                }
                document.getElementById(`v-${ri}-${ci}`).classList.add('h-cell');
            }
            
            document.getElementById('vig-show-ans-btn').style.display = "none";
            document.getElementById('vig-next-btn').style.display = "block";
        }

        function updateVigStats() { 
            const displayLives = state.lives < 0 ? 0 : state.lives;
            document.getElementById('vig-lives').textContent = displayLives; 
        }

                        // --- ПЛЕЙФЕР ---
        const PF_ALPHABET = "абвгґдеєжзиіїйклмнопрстуфхцчшщьюя_.[]";
        const PF_WORDS = ["БЕЗПЕКА", "КРИПТО", "ЗАХИСТ", "МЕРЕЖА", "ДОСТУП", "ТЕРМІНАЛ"];
        const PF_KEYS = ["ВЕКТОР", "СИСТЕМА", "СЕРВЕР", "МАТРИЦЯ"];

        function initPlayfair() {
            state.lives = 3; state.score = 0; state.pfStep = 0; state.pfFinalText = "";
            state.pfCurrentWord = PF_WORDS[Math.floor(Math.random() * PF_WORDS.length)];
            const key = PF_KEYS[Math.floor(Math.random() * PF_KEYS.length)];
            let word = state.pfCurrentWord.toUpperCase();
            if (word.length % 2 !== 0) word += "_";
            state.pfBigrams = [];
            for (let i = 0; i < word.length; i += 2) state.pfBigrams.push(word.substring(i, i + 2));
            state.pfMatrix = generatePlayfairMatrix(key);
            document.getElementById('pf-target-word-display').innerText = state.pfCurrentWord;
            document.getElementById('pf-progress-bar').innerText = "";
            document.getElementById('pf-active-area').style.display = "block";
            document.getElementById('pf-final-block').style.display = "none";
            updatePFStats(); showScreen('playfair-screen'); drawPFMatrix(); nextPlayfairStep();
        }

        function generatePlayfairMatrix(key) {
            let used = new Set(); let flat = [];
            key.toUpperCase().split('').forEach(c => { if (!used.has(c)) { used.add(c); flat.push(c); } });
            PF_ALPHABET.toUpperCase().split('').forEach(c => { if (!used.has(c)) { used.add(c); flat.push(c); } });
            let matrix = [];
            for (let i = 0; i < 5; i++) matrix.push(flat.slice(i * 7, (i + 1) * 7));
            return matrix;
        }

        function drawPFMatrix() {
            let html = "";
            state.pfMatrix.forEach(row => { html += "<tr>" + row.map(c => `<td id="pf-${c}">${c}</td>`).join('') + "</tr>"; });
            document.getElementById('pf-matrix-table').innerHTML = html;
        }

        function nextPlayfairStep() {
            if (state.pfStep >= state.pfBigrams.length) {
                document.getElementById('pf-active-area').style.display = "none";
                document.getElementById('pf-final-block').style.display = "block";
                document.getElementById('pf-final-result').innerText = state.pfFinalText;
                return;
            }
            document.querySelectorAll('.pf-highlight').forEach(el => el.classList.remove('pf-highlight'));
            const bigram = state.pfBigrams[state.pfStep];
            document.getElementById('pf-current-bigram').innerText = bigram;
            document.getElementById('pf-step-info').innerText = `Крок ${state.pfStep + 1}: Пара "${bigram}"`;
            bigram.split('').forEach(char => {
                const el = document.getElementById(`pf-${char.toUpperCase()}`);
                if (el) el.classList.add('pf-highlight');
            });
            document.getElementById('pf-answer').value = "";
            document.getElementById('pf-feedback').style.display = "none";
            document.getElementById('pf-next-btn').style.display = "none";
            const checkBtn = document.getElementById('pf-check-btn');
            checkBtn.style.display = "block";
            checkBtn.disabled = false;
        }

        async function checkPlayfair() {
            if (state.lives <= 0) return;

            const bigram = state.pfBigrams[state.pfStep];
            const ansInput = document.getElementById('pf-answer');
            const ans = ansInput.value.trim().toUpperCase();
            const fb = document.getElementById('pf-feedback');
            const checkBtn = document.getElementById('pf-check-btn');
            
            checkBtn.disabled = true;

            let r1, c1, r2, c2;
            state.pfMatrix.forEach((row, r) => row.forEach((char, c) => {
                if (char === bigram[0].toUpperCase()) { r1 = r; c1 = c; }
                if (char === bigram[1].toUpperCase()) { r2 = r; c2 = c; }
            }));
            
            let correct = "";
            if (r1 === r2) correct = state.pfMatrix[r1][(c1 + 1) % 7] + state.pfMatrix[r2][(c2 + 1) % 7];
            else if (c1 === c2) correct = state.pfMatrix[(r1 + 1) % 5][c1] + state.pfMatrix[(r2 + 1) % 5][c2];
            else correct = state.pfMatrix[r1][c2] + state.pfMatrix[r2][c1];

            if (ans === correct) {
                state.score += 5; state.pfFinalText += correct; state.pfStep++;
                document.getElementById('pf-progress-bar').innerText = state.pfFinalText;
                updatePFStats(); await syncStars(5);
                fb.innerHTML = "ВІРНО! +5 ⭐";
                fb.style.color = "#facc15";
                fb.style.borderColor = "#facc15";
                fb.style.display = "block";
                checkBtn.style.display = "none";
                document.getElementById('pf-next-btn').style.display = "block";
            } else {
                state.lives--; 
                updatePFStats();
                fb.innerHTML = "ПОМИЛКА";
                fb.style.color = "#ef4444";
                fb.style.borderColor = "#ef4444";
                fb.style.display = "block";
                
                if (state.lives <= 0) {
                    checkBtn.disabled = true;
                    setTimeout(gameOver, 800);
                } else {
                    checkBtn.disabled = false;
                }
            }
        }

        function updatePFStats() {
            const displayLives = state.lives < 0 ? 0 : state.lives;
            document.getElementById('pf-lives').textContent = displayLives;
            document.getElementById('pf-score').textContent = state.score;
        }
    </script>
</body>
</html>
