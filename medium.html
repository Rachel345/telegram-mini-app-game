<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>–°–µ—А–µ–і–љ—Ц–є —А—Ц–≤–µ–љ—М - –Ъ—А—Ц–њ—В–Њ-—В—А–µ–љ–∞–ґ–µ—А</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: var(--tg-theme-bg-color, #1a1a2e) !important;
            color: var(--tg-theme-text-color, #eee) !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 16px; min-height: 100vh;
        }
        .screen { display: none; flex-direction: column; align-items: center; gap: 16px; max-width: 400px; margin: 0 auto; }
        .screen.active { display: flex; }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 16px; padding: 24px; width: 100%; position: relative;
        }

        .menu-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; text-align: center; }
        
        .game-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 12px; width: 100%; margin-bottom: 8px;
        }
        .timer-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 3px; margin-bottom: 20px; overflow: hidden;
        }
        .timer-bar { width: 100%; height: 100%; background: #ef4444; transition: width 0.1s linear; }

        .vigenere-wrap { width: 100%; overflow-x: auto; margin: 15px 0; border-radius: 8px; background: #0f172a; border: 1px solid #2ea6ff; }
        table { border-collapse: collapse; font-size: 9px; color: #94a3b8; width: 100%; }
        td, th { width: 18px; height: 18px; text-align: center; border: 1px solid #1e293b; text-transform: uppercase; }
        th { background: #1e293b; color: #2ea6ff; }
        .h-cell { background: #2ea6ff !important; color: white !important; font-weight: bold; }

        .input-box { width: 100%; margin-bottom: 15px; }
        .input-box label { display: block; font-size: 12px; color: #2ea6ff; margin-bottom: 5px; }
        .input-box input {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px; border-radius: 10px; font-size: 16px;
        }
        .input-box input:disabled { opacity: 0.7; color: #facc15; }

        .btn {
            background: var(--tg-theme-button-color, #2ea6ff);
            color: var(--tg-theme-button-text-color, #fff) !important;
            border: none; border-radius: 12px; padding: 14px; width: 100%; font-size: 16px; cursor: pointer;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid #2ea6ff; color: #2ea6ff !important; margin-top: 10px; }
        .btn-exit { background: transparent; border: 1px solid #ef4444; color: #ef4444 !important; margin-top: 20px; }
        .btn-danger { background: #ef4444 !important; color: white !important; }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }
        .option-btn {
            background: rgba(255,255,255,0.05); color: inherit; border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 14px; font-size: 16px; cursor: pointer;
        }
        .option-btn.correct { border-color: #22c55e; background: rgba(34, 197, 94, 0.2); }
        .option-btn.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.2); }
        .feedback-box { margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- –Х–Ъ–†–Р–Э –Т–Ш–С–Ю–†–£ –†–Ж–Т–Э–ѓ -->
    <div id="menu-screen" class="screen active">
        <h2 class="menu-title">–°–µ—А–µ–і–љ—Ц–є —А—Ц–≤–µ–љ—М</h2>
        <div class="card">
            <button class="btn" onclick="initAtbash()">–†—Ц–≤–µ–љ—М 1: –Р—В–±–∞—И</button>
            <button class="btn" style="margin-top: 12px;" onclick="initVigenere()">–†—Ц–≤–µ–љ—М 2: –Т—Ц–ґ–µ–љ–µ—А</button>
            <button class="btn btn-exit" onclick="window.location.href='index.html'">–Э–∞–Ј–∞–і</button>
        </div>
    </div>

    <!-- –Х–Ъ–†–Р–Э –Р–Ґ–С–Р–® -->
    <div id="atbash-screen" class="screen">
        <div class="game-header">
            <span>вЭ§пЄП <span id="atbash-lives">5</span></span>
            <span style="font-weight: bold; color: #facc15;">–Р—В–±–∞—И</span>
            <span>в≠Р <span id="atbash-score">0</span></span>
        </div>
        <div class="card">
            <div class="timer-container"><div id="atbash-timer-bar" class="timer-bar"></div></div>
            <p style="text-align: center; opacity: 0.8;">–†–Њ–Ј—И–Є—Д—А—Г–є —Б–ї–Њ–≤–Њ:</p>
            <div id="atbash-word" style="font-size: 26px; font-weight: bold; text-align: center; margin: 15px 0;">---</div>
            <div id="atbash-options" class="options-grid"></div>
            <div id="atbash-feedback" class="feedback-box" style="display:none;"></div>
            <button id="atbash-next" class="btn" style="display:none; margin-top:10px;">–Э–∞—Б—В—Г–њ–љ–µ</button>
        </div>
        <button class="btn btn-exit" onclick="resetToMenu()">–Т–Є–є—В–Є</button>
    </div>

    <!-- –Х–Ъ–†–Р–Э –Т–Ж–Ц–Х–Э–Х–†–Р -->
    <div id="vigenere-screen" class="screen">
        <div class="game-header">
            <span>вЭ§пЄП <span id="vig-lives">3</span></span>
            <span style="font-weight: bold; color: #2ea6ff;">–Т—Ц–ґ–µ–љ–µ—А</span>
            <span>вП±пЄП <span id="vig-timer-text">60</span>—Б</span>
        </div>
        <div class="card">
            <div class="input-box">
                <label>–Т–Є—Е—Ц–і–љ–Є–є —В–µ–Ї—Б—В (–Ь):</label>
                <input type="text" id="vig-m" readonly>
            </div>
            <div class="input-box">
                <label>–Ъ–ї—О—З–Њ–≤–µ —Б–ї–Њ–≤–Њ (–Ъ):</label>
                <input type="text" id="vig-k" readonly>
            </div>
            <div id="vig-table-area" class="vigenere-wrap" style="display:none;"><table id="tabula-recta"></table></div>
            <div class="input-box">
                <label>–Т–∞—И —А–µ–Ј—Г–ї—М—В–∞—В (–°):</label>
                <input type="text" id="vig-answer" placeholder="–Т–≤–µ–і—Ц—В—М —А–µ–Ј—Г–ї—М—В–∞—В...">
            </div>
            <div id="vig-feedback" class="feedback-box" style="display:none;"></div>
            
            <button id="vig-check-btn" class="btn" onclick="checkVigenere()">–Я–µ—А–µ–≤—Ц—А–Є—В–Є —А–µ–Ј—Г–ї—М—В–∞—В</button>
            <button id="vig-show-ans-btn" class="btn btn-danger" style="display:none;" onclick="showVigenereSolution()">–Я–Њ–Ї–∞–Ј–∞—В–Є –њ—А–∞–≤–Є–ї—М–љ—Г –≤—Ц–і–њ–Њ–≤—Ц–і—М</button>
            <button id="vig-next-btn" class="btn" style="display:none; margin-top:10px;" onclick="generateNewVigenereTask()">–Э–∞—Б—В—Г–њ–љ–µ —Б–ї–Њ–≤–Њ</button>
            
            <button class="btn btn-outline" id="hint-btn" onclick="useHint()">–Я—Ц–і–Ї–∞–Ј–Ї–∞ (–Ґ–∞–±–ї–Є—Ж—П) -10—Б</button>
        </div>
        <button class="btn btn-exit" onclick="resetToMenu()">–Т–Є–є—В–Є</button>
    </div>

    <!-- –Х–Ъ–†–Р–Э –Ч–Р–Т–Х–†–®–Х–Э–Э–ѓ -->
    <div id="game-over-screen" class="screen">
        <div class="card" style="text-align: center;">
            <h2>–У—А—Г –Ј–∞–≤–µ—А—И–µ–љ–Њ!</h2>
            <p style="font-size: 18px; margin: 20px 0;">–Т–∞—И —А–µ–Ј—Г–ї—М—В–∞—В: <span id="final-score">0</span> в≠Р</p>
            <button class="btn" onclick="resetToMenu()">–Ф–Њ –≤–Є–±–Њ—А—Г —А—Ц–≤–љ—Ц–≤</button>
            <button class="btn btn-outline" onclick="window.location.href='index.html'">–Т –Љ–µ–љ—О</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const ALPHABET = "–∞–±–≤–≥“С–і–µ—Ф–ґ–Ј–Є—Ц—Ч–є–Ї–ї–Љ–љ–Њ–њ—А—Б—В—Г—Д—Е—Ж—З—И—Й—М—О—П";
        const WORDS = ["–±–ї–Њ–Ї—З–µ–є–љ", "–∞–ї–≥–Њ—А–Є—В–Љ", "–Ї—А–Є–њ—В–Њ", "–Ј–∞—Е–Є—Б—В", "–њ–∞—А–Њ–ї—М", "–Љ–µ—А–µ–ґ–∞", "—Ж–Є—Д—А–∞", "—Б–µ—А–≤–µ—А", "–Љ–∞–є–љ—Ц–љ–≥", "–Ї–ї—О—З—Ц", "–і–µ–њ–Њ–Ј–Є—В"];
        const V_KEYS = ["–Ї–Њ–і", "–±–∞–Ј–∞", "—Е–∞–±", "–±—Ц—В", "—Б—В–µ–Ї"];
        
        let state = { lives: 0, score: 0, timer: null, timeLeft: 0, correctAnswer: "", hintUsed: false };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function resetToMenu() {
            clearInterval(state.timer);
            showScreen('menu-screen');
        }

        function gameOver() {
            clearInterval(state.timer);
            document.getElementById('final-score').textContent = state.score;
            showScreen('game-over-screen');
        }

        async function syncStars(points) {
            const userId = tg.initDataUnsafe?.user?.id || 981926714;
            try {
                await fetch('https://anyway-art-mustard.ngrok-free.dev/update_stars', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ user_id: userId, stars: points })
                });
            } catch (e) { console.error(e); }
        }

        // --- –Р–Ґ–С–Р–® ---
        function initAtbash() {
            state.lives = 5; state.score = 0;
            updateAtbashStats();
            showScreen('atbash-screen');
            nextAtbashQuestion();
        }

        function nextAtbashQuestion() {
            if (state.lives <= 0) { gameOver(); return; }
            const word = WORDS[Math.floor(Math.random() * WORDS.length)];
            state.correctAnswer = word;
            document.getElementById('atbash-word').textContent = word.split('').map(c => {
                let i = ALPHABET.indexOf(c.toLowerCase());
                return i < 0 ? c : ALPHABET[ALPHABET.length - 1 - i];
            }).join('');
            
            document.getElementById('atbash-feedback').style.display = "none";
            document.getElementById('atbash-next').style.display = "none";
            const opts = document.getElementById('atbash-options');
            opts.innerHTML = "";
            
            let choices = new Set([word]);
            while(choices.size < 4) choices.add(WORDS[Math.floor(Math.random()*WORDS.length)]);
            [...choices].sort(() => Math.random()-0.5).forEach(val => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.textContent = val;
                b.onclick = async () => {
                    document.querySelectorAll('#atbash-options .option-btn').forEach(btn => btn.disabled = true);
                    clearInterval(state.timer);
                    if(val === state.correctAnswer) {
                        b.classList.add('correct');
                        state.score += 3;
                        document.getElementById('atbash-feedback').innerHTML = "вЬЕ –Я—А–∞–≤–Є–ї—М–љ–Њ! +3 в≠Р";
                        document.getElementById('atbash-feedback').style.color = "#22c55e";
                        await syncStars(3);
                    } else {
                        b.classList.add('wrong');
                        state.lives--;
                        document.getElementById('atbash-feedback').innerHTML = `вЭМ –Э–µ–њ—А–∞–≤–Є–ї—М–љ–Њ! –¶–µ –±—Г–ї–Њ: ${state.correctAnswer}`;
                        document.getElementById('atbash-feedback').style.color = "#ef4444";
                    }
                    updateAtbashStats();
                    document.getElementById('atbash-feedback').style.display = "block";
                    document.getElementById('atbash-next').style.display = "block";
                };
                opts.appendChild(b);
            });
            startAtbashTimer();
        }

        function startAtbashTimer() {
            state.timeLeft = 150; clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.timeLeft--;
                document.getElementById('atbash-timer-bar').style.width = (state.timeLeft / 1.5) + "%";
                if(state.timeLeft <= 0) { clearInterval(state.timer); state.lives--; updateAtbashStats(); nextAtbashQuestion(); }
            }, 100);
        }

        function updateAtbashStats() {
            document.getElementById('atbash-lives').textContent = state.lives;
            document.getElementById('atbash-score').textContent = state.score;
        }
        document.getElementById('atbash-next').onclick = nextAtbashQuestion;

        // --- –Т–Ж–Ц–Х–Э–Х–† ---
        function initVigenere() {
            state.lives = 3; 
            state.score = 0; 
            showScreen('vigenere-screen');
            generateNewVigenereTask();
        }

        function generateNewVigenereTask() {
            if(state.lives <= 0) { gameOver(); return; }
            
            // –Ю—З–Є—Й–µ–љ–љ—П –њ—Ц–і—Б–≤—Ц—В–Ї–Є —В–∞–±–ї–Є—Ж—Ц
            document.querySelectorAll('#tabula-recta .h-cell').forEach(cell => cell.classList.remove('h-cell'));

            const m = WORDS[Math.floor(Math.random()*WORDS.length)].toUpperCase();
            const k = V_KEYS[Math.floor(Math.random()*V_KEYS.length)].toUpperCase();
            
            state.correctAnswer = "";
            let kIdx = 0;
            for(let i=0; i<m.length; i++) {
                let ci = ALPHABET.indexOf(m[i].toLowerCase());
                let ki = ALPHABET.indexOf(k[kIdx % k.length].toLowerCase());
                if (ci !== -1) {
                    state.correctAnswer += ALPHABET[(ci + ki) % ALPHABET.length].toUpperCase();
                    kIdx++;
                } else {
                    state.correctAnswer += m[i];
                }
            }

            document.getElementById('vig-m').value = m;
            document.getElementById('vig-k').value = k;
            document.getElementById('vig-answer').value = "";
            document.getElementById('vig-answer').disabled = false;
            document.getElementById('vig-feedback').style.display = "none";
            document.getElementById('vig-next-btn').style.display = "none";
            document.getElementById('vig-show-ans-btn').style.display = "none";
            document.getElementById('vig-check-btn').style.display = "block";
            document.getElementById('vig-table-area').style.display = "none";
            document.getElementById('hint-btn').disabled = false;
            
            state.hintUsed = false;
            state.timeLeft = 60;
            updateVigStats();
            startVigenereTimer();
        }

        function startVigenereTimer() {
            clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.timeLeft--;
                if (state.timeLeft < 0) state.timeLeft = 0;
                document.getElementById('vig-timer-text').textContent = state.timeLeft;
                
                if(state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    if(state.lives > 0) state.lives--;
                    updateVigStats();
                    
                    document.getElementById('vig-answer').disabled = true;
                    document.getElementById('hint-btn').disabled = true;
                    
                    const feedback = document.getElementById('vig-feedback');
                    feedback.style.display = "block";
                    feedback.innerHTML = "вП∞ –І–∞—Б –≤–Є–є—И–Њ–≤! –°–њ—А–Њ–±—Г–є –љ–Њ–≤–µ —Б–ї–Њ–≤–Њ –∞–±–Њ –њ–Њ–і–Є–≤–Є—Б—М –≤—Ц–і–њ–Њ–≤—Ц–і—М.";
                    feedback.style.color = "#facc15";
                    
                    document.getElementById('vig-check-btn').style.display = "none";
                    document.getElementById('vig-show-ans-btn').style.display = "block";
                }
            }, 1000);
        }

        function buildVigenereTable() {
            const table = document.getElementById('tabula-recta');
            let html = "<tr><th></th>" + ALPHABET.split('').map(c => `<th>${c}</th>`).join('') + "</tr>";
            for(let i=0; i<ALPHABET.length; i++) {
                html += `<tr><th>${ALPHABET[i]}</th>` + ALPHABET.split('').map((_, j) => `<td id="v-${i}-${j}">${ALPHABET[(i+j)%ALPHABET.length]}</td>`).join('') + "</tr>";
            }
            table.innerHTML = html;
        }

        function useHint() {
            if(!state.hintUsed) {
                state.timeLeft = Math.max(0, state.timeLeft - 10);
                state.hintUsed = true;
                document.getElementById('vig-timer-text').textContent = state.timeLeft;
            }
            document.getElementById('vig-table-area').style.display = 
                document.getElementById('vig-table-area').style.display === "none" ? "block" : "none";
            if(document.getElementById('tabula-recta').innerHTML === "") buildVigenereTable();
        }

        async function checkVigenere() {
            const ans = document.getElementById('vig-answer').value.trim().toUpperCase();
            const feedback = document.getElementById('vig-feedback');
            
            clearInterval(state.timer); // –Ч—Г–њ–Є–љ–Ї–∞ —В–∞–є–Љ–µ—А–∞ –љ–∞ —З–∞—Б –њ–Њ–Ї–∞–Ј—Г —Д—Ц–і–±–µ–Ї—Г
            document.getElementById('vig-answer').disabled = true;
            document.getElementById('hint-btn').disabled = true;

            if(ans === state.correctAnswer) {
                state.score += 5;
                feedback.style.display = "block";
                feedback.innerHTML = "вЬЕ –Я—А–∞–≤–Є–ї—М–љ–Њ! +5 в≠Р";
                feedback.style.color = "#22c55e";
                document.getElementById('vig-check-btn').style.display = "none";
                document.getElementById('vig-next-btn').style.display = "block";
                await syncStars(5);
            } else {
                if(state.lives > 0) state.lives--;
                updateVigStats();
                tg.HapticFeedback?.notificationOccurred?.('error');
                
                feedback.style.display = "block";
                feedback.innerHTML = "вЭМ –Э–µ–њ—А–∞–≤–Є–ї—М–љ–Њ! –°–њ—А–Њ–±—Г–є —Й–µ —А–∞–Ј –∞–±–Њ –њ–Њ–і–Є–≤–Є—Б—М –≤—Ц–і–њ–Њ–≤—Ц–і—М.";
                feedback.style.color = "#ef4444";
                
                document.getElementById('vig-check-btn').style.display = "none";
                document.getElementById('vig-show-ans-btn').style.display = "block";
            }
        }

        function showVigenereSolution() {
            document.getElementById('vig-answer').value = state.correctAnswer;
            document.getElementById('vig-table-area').style.display = "block";
            if(document.getElementById('tabula-recta').innerHTML === "") buildVigenereTable();
            
            // –Я—Ц–і—Б–≤—Ц—В–Ї–∞ –њ–µ—А—И–Њ—Ч –ї—Ц—В–µ—А–Є —В–µ–Ї—Б—В—Г —В–∞ –Ї–ї—О—З–∞
            const m = document.getElementById('vig-m').value;
            const k = document.getElementById('vig-k').value;
            const ri = ALPHABET.indexOf(m[0].toLowerCase());
            const ci = ALPHABET.indexOf(k[0].toLowerCase());
            
            if(ri !== -1 && ci !== -1) {
                const cell = document.getElementById(`v-${ri}-${ci}`);
                if(cell) cell.classList.add('h-cell');
            }
            
            document.getElementById('vig-show-ans-btn').style.display = "none";
            document.getElementById('vig-next-btn').style.display = "block";
        }

        function updateVigStats() {
            document.getElementById('vig-lives').textContent = state.lives;
        }
    </script>
</body>
</html>
