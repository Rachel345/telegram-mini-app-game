<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Середній рівень - Кріпто-тренажер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * { box-sizing: border-box; }
      body {
        background-color: var(--tg-theme-bg-color, #1a1a2e) !important;
        color: var(--tg-theme-text-color, #eee) !important;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 16px; min-height: 100vh;
      }
      .screen {
        display: none; flex-direction: column; align-items: center; justify-content: flex-start;
        gap: 16px; max-width: 400px; margin: 0 auto;
      }
      .screen.active { display: flex; }
      
      .card {
        background: var(--tg-theme-secondary-bg-color, #16213e);
        border-radius: 16px; padding: 24px; width: 100%; position: relative;
      }
      .timer-container {
        width: 100%; height: 6px; background: rgba(255,255,255,0.1);
        border-radius: 3px; margin-bottom: 20px; overflow: hidden;
      }
      #timer-bar {
        width: 100%; height: 100%; background: #ef4444; transition: width 0.1s linear;
      }
      .game-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px; background: var(--tg-theme-secondary-bg-color, #16213e);
        border-radius: 12px; width: 100%; margin-bottom: 8px;
      }
      .cipher-word {
        font-size: 26px; font-weight: bold; margin: 12px 0; text-align: center;
        letter-spacing: 2px; color: #fff; word-break: break-all;
      }
      .cipher-info { font-size: 16px; color: #2ea6ff; text-align: center; margin-bottom: 15px; font-weight: 500; }
      .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }
      .option-btn {
        background: rgba(255,255,255,0.05); color: inherit; border: 2px solid rgba(255,255,255,0.1);
        border-radius: 12px; padding: 14px; font-size: 16px; cursor: pointer; transition: 0.2s;
      }
      .option-btn.correct { border-color: #22c55e; background: rgba(34, 197, 94, 0.2); }
      .option-btn.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.2); }
      .btn {
        background: var(--tg-theme-button-color, #2ea6ff);
        color: var(--tg-theme-button-text-color, #fff) !important;
        border: none; border-radius: 12px; padding: 14px; width: 100%; font-size: 16px; margin-top: 10px;
      }
      .back-btn { background: transparent; border: 1px solid #ef4444; color: #ef4444 !important; }
    </style>
  </head>
  <body>
    <!-- Ігровий екран -->
    <div id="game-screen" class="screen active">
      <div class="game-header">
        <span>❤️ <span id="lives">5</span></span>
        <span style="font-weight: bold; color: #facc15;">Атбаш</span>
        <span>⭐ <span id="score">0</span></span>
      </div>

      <div class="card">
        <div class="timer-container"><div id="timer-bar"></div></div>
        <p id="instr" style="text-align: center; opacity: 0.8; margin-bottom: 10px;">Розшифруй слово:</p>
        <div id="word" class="cipher-word">---</div>
        <div class="cipher-info">Дзеркальний шифр</div>
        <div id="options" class="options-grid"></div>
        <div id="feedback" style="display:none; margin-top:15px; text-align:center; font-weight:bold;"></div>
        <button id="next-btn" class="btn" style="display:none;">Наступне</button>
      </div>

      <button id="exit-btn" class="btn back-btn">Вийти в меню</button>
    </div>

    <!-- Екран завершення гри -->
    <div id="game-over-screen" class="screen">
      <div class="card" style="text-align: center;">
        <h2>Гру завершено!</h2>
        <p>Ваш результат: <span id="final-score">0</span></p>
        <button id="restart-btn" class="btn">В меню</button>
      </div>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.expand();
      
      const userId = tg.initDataUnsafe?.user?.id || 981926714;
      const ALPHABET = "абвгґдеєжзиіїйклмнопрстуфхцчшщьюя";
      
      const WORDS = [
        "блокчейн", "транзакція", "алгоритм", "протокол", "валідатор", 
        "депозит", "контракт", "майнінг", "ключі", "безпека", 
        "інвестиція", "криптографія", "конфіденційність", "децентралізація",
        "ідентифікація", "верифікація", "хешування", "генерація"
      ];
      
      let state = { lives: 5, score: 0, timeLeft: 150 };
      let timerInterval;

      async function savePoints(points) {
        if (userId !== 0) {
          try {
            await fetch('https://anyway-art-mustard.ngrok-free.dev/update_stars', {
              method: 'POST',
              headers: { 
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true'
              },
              body: JSON.stringify({ user_id: userId, stars: points })
            });
          } catch (e) {
            console.error("Помилка збереження балів:", e);
          }
        }
      }

      function atbash(text) {
        return text.split('').map(char => {
          let idx = ALPHABET.indexOf(char.toLowerCase());
          if (idx < 0) return char;
          return ALPHABET[ALPHABET.length - 1 - idx];
        }).join('');
      }

      function startTimer() {
        state.timeLeft = 150; 
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          state.timeLeft--;
          document.getElementById('timer-bar').style.width = (state.timeLeft / 1.5) + "%";
          if (state.timeLeft <= 0) {
            clearInterval(timerInterval);
            timeOut();
          }
        }, 100);
      }

      function timeOut() {
        state.lives--;
        updateStats();
        document.getElementById('feedback').textContent = "⏰ Час вийшов!";
        document.getElementById('feedback').style.display = "block";
        document.getElementById('next-btn').style.display = "block";
        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
      }

      function showGameOver() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('game-over-screen').classList.add('active');
        document.getElementById('final-score').textContent = state.score;
      }

      async function nextQuestion() {
        if (state.lives <= 0) {
          showGameOver();
          return;
        }
        const word = WORDS[Math.floor(Math.random() * WORDS.length)];
        const encrypted = atbash(word);
        document.getElementById('word').textContent = encrypted;
        document.getElementById('feedback').style.display = "none";
        document.getElementById('next-btn').style.display = "none";
        generateOptions(word);
        startTimer();
      }

      function generateOptions(correct) {
        let choices = new Set([correct]);
        while(choices.size < 4) { 
          let randomWord = WORDS[Math.floor(Math.random() * WORDS.length)];
          choices.add(randomWord); 
        }
        
        let shuffled = [...choices].sort(() => Math.random() - 0.5);
        const opts = document.getElementById('options');
        opts.innerHTML = "";
        
        shuffled.forEach(val => {
          const b = document.createElement('button');
          b.className = 'option-btn';
          b.textContent = val;
          b.onclick = async () => {
            clearInterval(timerInterval);
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
            if (val === correct) {
              b.classList.add('correct');
              state.score += 2;
              document.getElementById('feedback').textContent = "✅ Правильно! +2 ⭐";
              await savePoints(2); 
            } else {
              b.classList.add('wrong');
              state.lives--;
              document.getElementById('feedback').textContent = "❌ Помилка! Це був " + correct;
            }
            updateStats();
            document.getElementById('feedback').style.display = "block";
            document.getElementById('next-btn').style.display = "block";
          };
          opts.appendChild(b);
        });
      }

      function updateStats() {
        document.getElementById('lives').textContent = state.lives;
        document.getElementById('score').textContent = state.score;
      }

      document.getElementById('next-btn').onclick = nextQuestion;
      document.getElementById('exit-btn').onclick = () => { window.location.href = 'index.html'; };
      document.getElementById('restart-btn').onclick = () => { window.location.href = 'index.html'; };

      nextQuestion();
    </script>
  </body>
</html>
