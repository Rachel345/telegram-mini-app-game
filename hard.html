<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>–°–Ї–ї–∞–і–љ–Є–є —А—Ц–≤–µ–љ—М - –Ъ—А—Ц–њ—В–Њ-—В—А–µ–љ–∞–ґ–µ—А</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* –Я–Ю–Т–Э–Ш–Щ –Ж–У–Э–Ю–† –Ґ–Х–Ь–Ш –Ґ–Х–Ы–Х–У–†–Р–Ь - CYBERPUNK DARK STYLE */
        * { box-sizing: border-box; }
        body {
            background-color: #0a0a0c !important;
            color: #f1f5f9 !important;
            font-family: 'Courier New', Courier, monospace; /* –•–∞–Ї–µ—А—Б—М–Ї–Є–є —И—А–Є—Д—В */
            margin: 0; padding: 12px; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 12px 15px; 
            background: rgba(56, 189, 248, 0.05); 
            border-radius: 12px;
            border: 2px solid #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .mission-box {
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 12px; padding: 14px; margin-bottom: 15px;
            font-size: 14px; line-height: 1.4; color: #cbd5e1;
        }

        .card {
            background: rgba(15, 23, 42, 0.8); 
            border-radius: 16px; padding: 20px; width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .cipher-display {
            background: rgba(0, 0, 0, 0.4); 
            padding: 20px; border-radius: 10px;
            text-align: center; 
            border: 2px solid #38bdf8; 
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .cipher-word { 
            font-size: 24px; font-weight: 800; letter-spacing: 4px; color: #38bdf8; 
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
        }

        .helper-section {
            background: rgba(0, 0, 0, 0.3); border-radius: 8px; padding: 10px;
            margin-bottom: 15px; font-family: monospace; font-size: 11px; 
            overflow-x: auto; border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .alphabet-grid {
            display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; text-align: center;
        }

        .letter-box { border: 1px solid #334155; border-radius: 4px; padding: 2px; background: rgba(0,0,0,0.2); }
        .letter-idx { color: #38bdf8; display: block; font-size: 9px; }

        .step-container {
            border-left: 3px solid #1e293b; padding-left: 15px; margin-bottom: 20px;
            opacity: 0.4; transition: 0.3s;
        }

        .step-container.active { border-left-color: #38bdf8; opacity: 1; }

        input[type="text"] {
            width: 100%; background: #000; border: 1px solid #38bdf8;
            color: #fff; padding: 12px; border-radius: 8px; font-size: 16px;
            text-transform: uppercase; outline: none; margin-top: 8px;
            box-shadow: inset 0 0 5px rgba(56, 189, 248, 0.2);
        }

        .btn {
            background: transparent; color: #38bdf8; 
            border: 2px solid #38bdf8; border-radius: 10px;
            padding: 14px; width: 100%; font-weight: bold; cursor: pointer; 
            margin-top: 10px; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .btn:active { transform: scale(0.98); background: rgba(56, 189, 248, 0.1); }
        .btn:disabled { border-color: #475569; color: #475569; box-shadow: none; cursor: not-allowed; }
        
        .btn-success { border-color: #22c55e; color: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
        .btn-exit { border-color: #ef4444; color: #ef4444; margin-top: 15px; }

        .validation-msg { font-size: 13px; margin-top: 8px; min-height: 18px; font-weight: bold; }
        .text-success { color: #22c55e; }
        .text-error { color: #ef4444; }

        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }

        .atbash-row { display: flex; justify-content: space-around; border-bottom: 1px solid #1e293b; padding: 4px 0; }
        
        #timer { color: #facc15; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-screen" class="screen active">
        <div class="header">
            <span>вЭ§пЄП <span id="lives-count">3</span></span>
            <span style="color: #38bdf8; font-weight: bold;">MISSION <span id="mission-num">1</span></span>
            <span>вП±пЄП <span id="timer">05:00</span></span>
        </div>

        <div id="mission-text" class="mission-box">...</div>

        <div class="card">
            <div class="cipher-display">
                <div id="cipher-text" class="cipher-word">---</div>
            </div>

            <div class="helper-section">
                <div id="alphabet-helper" class="alphabet-grid"></div>
            </div>

            <div id="atbash-helper" class="helper-section" style="display:none;">
                <div id="atbash-grid"></div>
            </div>

            <div id="step-1-ui" class="step-container active">
                <div class="step-title" style="color:#38bdf8">–Ъ–†–Ю–Ъ 1: <span id="step1-name">–®–Ш–§–†</span></div>
                <input type="text" id="step1-input" placeholder="–Ф–µ–Ї–Њ–і—Г–≤–∞—В–Є –Ї—А–Њ–Ї 1..." autocomplete="off">
                <button id="step1-btn" class="btn" onclick="validateStep(1)">–Т—Б—В–∞–љ–Њ–≤–Є—В–Є –Ј–≤'—П–Ј–Њ–Ї</button>
                <div id="step1-msg" class="validation-msg"></div>
            </div>

            <div id="step-2-ui" class="step-container">
                <div class="step-title" style="color:#38bdf8">–Ъ–†–Ю–Ъ 2: <span id="step2-name">–®–Ш–§–†</span></div>
                <input type="text" id="step2-input" placeholder="–§—Ц–љ–∞–ї—М–љ–Є–є –Ї–ї—О—З..." disabled autocomplete="off">
                <button id="step2-btn" class="btn" onclick="validateStep(2)" disabled>–Ч–∞–≤–µ—А—И–Є—В–Є —А–Њ–Ј—И–Є—Д—А–Њ–≤–Ї—Г</button>
                <div id="step2-msg" class="validation-msg"></div>
            </div>

            <button id="next-btn" class="btn btn-success" style="display:none;" onclick="startNewMission()">–Э–Р–°–Ґ–£–Я–Э–Р –Ь–Ж–°–Ж–ѓ</button>
            <button class="btn btn-exit" onclick="exitToMenu()">–Я–Х–†–Х–†–Т–Р–Ґ–Ш –Ь–Ж–°–Ж–Ѓ</button>
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="card" style="text-align: center; border-color: #ef4444;">
            <h1 id="final-title" style="text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);">–Ь–Ж–°–Ж–Ѓ –Я–†–Ю–Т–Р–Ы–Х–Э–Ю</h1>
            <div style="font-size: 32px; color: #facc15; margin: 20px 0;">в≠РпЄП <span id="earned-stars">0</span></div>
            <button class="btn btn-success" onclick="location.reload()">–Я–Х–†–Х–Ч–Р–Я–£–°–Ґ–Ш–Ґ–Ш</button>
            <button class="btn btn-exit" onclick="exitToMenu()">–Т–Ш–Щ–Ґ–Ш –Т –У–Ю–Ы–Ю–Т–Э–Х –Ь–Х–Э–Ѓ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const ALPHABET = "–∞–±–≤–≥“С–і–µ—Ф–ґ–Ј–Є—Ц—Ч–є–Ї–ї–Љ–љ–Њ–њ—А—Б—В—Г—Д—Е—Ж—З—И—Й—М—О—П";
        const WORDS = ["–С–Ы–Ю–Ъ–І–Х–Щ–Э", "–Р–Ы–У–Ю–†–Ш–Ґ–Ь", "–Я–†–Ю–Ґ–Ю–Ъ–Ю–Ы", "–°–Ш–°–Ґ–Х–Ь–Р", "–Я–Р–†–Ю–Ы–ђ", "–Ч–Р–•–Ш–°–Ґ", "–Ь–Х–†–Х–Ц–Р", "–Ґ–Х–•–Э–Ю–Ы–Ю–У–Ж–ѓ", "–Ж–Э–Ґ–Х–†–Э–Х–Ґ", "–Ъ–†–Ш–Я–Ґ–Ю"];
        
        const MISSIONS = [
            {
                text: "–°–Є—Б—В–µ–Љ—Г –Ј–ї–∞–Љ–∞–љ–Њ –Ї–Њ–Љ–±—Ц–љ–Њ–≤–∞–љ–Є–Љ –Љ–µ—В–Њ–і–Њ–Љ. –°–њ–Њ—З–∞—В–Ї—Г –Ј–∞—Б—В–Њ—Б—Г–≤–∞–ї–Є <b>–Т—Ц–ґ–µ–љ–µ—А (–Ъ–Ы–Ѓ–І)</b>, –њ–Њ—В—Ц–Љ <b>–Р—В–±–∞—И</b>. –Т—Ц–і–љ–Њ–≤–Є –і–∞–љ—Ц –≤ –Ј–≤–Њ—А–Њ—В–љ–Њ–Љ—Г –њ–Њ—А—П–і–Ї—Г!", 
                steps: ["atbash", "vigenere"],
                vigenereKey: "–Ъ–Ы–Ѓ–І"
            },
            {
                text: "–Я–µ—А–µ—Е–Њ–њ–ї–µ–љ–Є–є —Б–Є–≥–љ–∞–ї –Љ–∞—Ф –њ–Њ–і–≤—Ц–є–љ–Є–є –Ј—Б—Г–≤: <b>–¶–µ–Ј–∞—А (+5)</b> —В–∞ <b>–Р—В–±–∞—И</b>. –Ч–љ–∞–є–і–Є –Њ—А–Є–≥—Ц–љ–∞–ї—М–љ–Є–є —В–µ–Ї—Б—В!", 
                steps: ["atbash", "caesar"],
                shift: 5
            },
            {
                text: "–Ъ—А–Є—В–Є—З–љ–∞ –Ј–∞–≥—А–Њ–Ј–∞! –Я–Њ—В—А—Ц–±–љ–Њ –Ј–љ—П—В–Є –Ј—Б—Г–≤ <b>–¶–µ–Ј–∞—А—П (+3)</b>, –∞ –њ–Њ—В—Ц–Љ —А–Њ–Ј–Ї–Њ–і—Г–≤–∞—В–Є <b>–Т—Ц–ґ–µ–љ–µ—А (–Ъ–Ы–Ѓ–І)</b>. –Я–Њ—Б–њ—Ц—И–∞–є!",
                steps: ["caesar", "vigenere"],
                shift: 3,
                vigenereKey: "–Ъ–Ы–Ѓ–І"
            }
        ];

        let state = { 
            missionIdx: 0, 
            lives: 3, 
            stars: 0, 
            timeLeft: 300, 
            timer: null, 
            correct1: "", 
            correct2: "" 
        };

        function runAtbash(text) {
            return text.toLowerCase().split('').map(c => {
                let i = ALPHABET.indexOf(c);
                return i < 0 ? c : ALPHABET[ALPHABET.length - 1 - i];
            }).join('').toUpperCase();
        }

        function runCaesar(text, shift) {
            return text.toLowerCase().split('').map(c => {
                let i = ALPHABET.indexOf(c);
                if (i < 0) return c;
                let ni = (i + shift) % ALPHABET.length;
                if (ni < 0) ni += ALPHABET.length;
                return ALPHABET[ni];
            }).join('').toUpperCase();
        }

        function runVigenere(text, key, decrypt = false) {
            let res = "";
            let kIdx = 0;
            const t = text.toLowerCase();
            const k = key.toLowerCase();
            for(let i=0; i<t.length; i++) {
                let ti = ALPHABET.indexOf(t[i]);
                if(ti < 0) { res += t[i]; continue; }
                let ki = ALPHABET.indexOf(k[kIdx % k.length]);
                let ni = decrypt ? (ti - ki) : (ti + ki);
                ni = ni % ALPHABET.length;
                if(ni < 0) ni += ALPHABET.length;
                res += ALPHABET[ni];
                kIdx++;
            }
            return res.toUpperCase();
        }

        function buildHelpers() {
            const grid = document.getElementById('alphabet-helper');
            grid.innerHTML = ALPHABET.split('').map((l, i) => 
                `<div class="letter-box"><span class="letter-idx">${i}</span>${l.toUpperCase()}</div>`
            ).join('');

            const atbashGrid = document.getElementById('atbash-grid');
            let r1 = ALPHABET.slice(0, 11).toUpperCase();
            let r2 = ALPHABET.slice(0, 11).split('').map(l => runAtbash(l)).join('').toUpperCase();
            
            atbashGrid.innerHTML = `
                <div style="opacity: 0.7; margin-bottom: 5px; font-size: 10px;">–Ф–Ч–Х–†–Ъ–Р–Ы–ђ–Э–Р –Ґ–Р–С–Ы–Ш–¶–ѓ (–Р–Ґ–С–Р–®):</div>
                <div class="atbash-row">${r1.split('').map(l => `<span>${l}</span>`).join('')}</div>
                <div class="atbash-row" style="color:#38bdf8">${r2.split('').map(l => `<span>${l}</span>`).join('')}</div>
            `;
        }

        function startNewMission() {
            if (state.missionIdx >= MISSIONS.length) return gameOver(true);
            const m = MISSIONS[state.missionIdx];
            const word = WORDS[Math.floor(Math.random() * WORDS.length)];
            
            let encrypted = word;
            // –®–Є—Д—А—Г–≤–∞–љ–љ—П –і–ї—П –Ј–∞–≤–і–∞–љ–љ—П (—Г –Ј–≤–Њ—А–Њ—В–љ–Њ–Љ—Г –њ–Њ—А—П–і–Ї—Г –≤—Ц–і –і–µ—И–Є—Д—А—Г–≤–∞–љ–љ—П)
            [...m.steps].reverse().forEach(s => {
                if(s === "atbash") encrypted = runAtbash(encrypted);
                if(s === "caesar") encrypted = runCaesar(encrypted, m.shift);
                if(s === "vigenere") encrypted = runVigenere(encrypted, m.vigenereKey, false);
            });

            // –Ґ–µ, —Й–Њ –≥—А–∞–≤–µ—Ж—М –Љ–∞—Ф –Њ—В—А–Є–Љ–∞—В–Є –њ—Ц—Б–ї—П 1-–≥–Њ –Ї—А–Њ–Ї—Г –і–µ—И–Є—Д—А—Г–≤–∞–љ–љ—П
            let s1 = encrypted;
            if(m.steps[0] === "atbash") s1 = runAtbash(s1);
            if(m.steps[0] === "caesar") s1 = runCaesar(s1, -m.shift);
            if(m.steps[0] === "vigenere") s1 = runVigenere(s1, m.vigenereKey, true);
            
            state.correct1 = s1;
            state.correct2 = word;

            document.getElementById('mission-num').textContent = state.missionIdx + 1;
            document.getElementById('mission-text').innerHTML = m.text;
            document.getElementById('cipher-text').textContent = encrypted;
            document.getElementById('step1-name').textContent = m.steps[0].toUpperCase();
            document.getElementById('step2-name').textContent = m.steps[1].toUpperCase();
            document.getElementById('atbash-helper').style.display = m.steps.includes('atbash') ? 'block' : 'none';

            resetUI();
            startTimer();
        }

        function resetUI() {
            document.getElementById('step1-input').value = "";
            document.getElementById('step1-input').disabled = false;
            document.getElementById('step1-btn').disabled = false;
            document.getElementById('step1-msg').textContent = "";
            
            document.getElementById('step2-input').value = "";
            document.getElementById('step2-input').disabled = true;
            document.getElementById('step2-btn').disabled = true;
            document.getElementById('step2-msg').textContent = "";

            document.getElementById('step-1-ui').classList.add('active');
            document.getElementById('step-2-ui').classList.remove('active');
            document.getElementById('next-btn').style.display = 'none';
        }

        function validateStep(n) {
            const input = document.getElementById(`step${n}-input`);
            const val = input.value.trim().toUpperCase();
            const target = (n === 1) ? state.correct1 : state.correct2;
            const msg = document.getElementById(`step${n}-msg`);

            if (val === target) {
                msg.textContent = ">>> –Ф–Ю–°–Ґ–£–Я –Ф–Ю–Ч–Т–Ю–Ы–Х–Э–Ю";
                msg.className = "validation-msg text-success";
                
                if (n === 1) {
                    state.stars += 5;
                    syncStars(5);
                    input.disabled = true;
                    document.getElementById('step1-btn').disabled = true;
                    document.getElementById('step2-input').disabled = false;
                    document.getElementById('step2-btn').disabled = false;
                    document.getElementById('step-2-ui').classList.add('active');
                    document.getElementById('step-1-ui').classList.remove('active');
                    tg.HapticFeedback?.notificationOccurred?.('success');
                } else {
                    state.stars += 10;
                    syncStars(10);
                    if(state.timer) clearInterval(state.timer);
                    state.missionIdx++;
                    input.disabled = true;
                    document.getElementById('step2-btn').disabled = true;

                    if (state.missionIdx >= MISSIONS.length) {
                        setTimeout(() => gameOver(true), 1000);
                    } else {
                        document.getElementById('next-btn').style.display = 'block';
                    }
                    tg.HapticFeedback?.notificationOccurred?.('success');
                }
            } else {
                state.lives--;
                document.getElementById('lives-count').textContent = state.lives;
                msg.textContent = ">>> –Я–Ю–Ь–Ш–Ы–Ъ–Р –Ф–Ю–°–Ґ–£–Я–£!";
                msg.className = "validation-msg text-error";
                tg.HapticFeedback?.notificationOccurred?.('error');
                if(state.lives <= 0) gameOver(false);
            }
        }

        function startTimer() {
            if(state.timer) clearInterval(state.timer);
            state.timeLeft = 300;
            state.timer = setInterval(() => {
                if(state.timeLeft <= 0) {
                    handleTimeout();
                } else {
                    state.timeLeft--;
                    let m = Math.floor(state.timeLeft / 60);
                    let s = state.timeLeft % 60;
                    document.getElementById('timer').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function handleTimeout() {
            state.lives--;
            document.getElementById('lives-count').textContent = state.lives;
            if(state.lives > 0) {
                startNewMission();
            } else {
                gameOver(false);
            }
        }

        function gameOver(victory) {
            if(state.timer) clearInterval(state.timer);
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('game-over-screen').classList.add('active');
            document.getElementById('earned-stars').textContent = state.stars;
            
            const title = document.getElementById('final-title');
            if(victory) {
                title.textContent = "–°–Ш–°–Ґ–Х–Ь–£ –Т–Ж–Ф–Э–Ю–Т–Ы–Х–Э–Ю";
                title.style.color = "#22c55e";
                title.style.textShadow = "0 0 10px rgba(34, 197, 94, 0.5)";
            } else {
                title.textContent = "–Ь–Ж–°–Ж–Ѓ –Я–†–Ю–Т–Р–Ы–Х–Э–Ю";
                title.style.color = "#ef4444";
            }
        }

        function exitToMenu() {
            window.location.href = 'index.html';
        }

        async function syncStars(amount) {
            const userId = tg.initDataUnsafe?.user?.id || 981926714;
            try {
                await fetch(`https://anyway-art-mustard.ngrok-free.dev/update_stars`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ user_id: userId, stars: amount })
                });
            } catch(e) {}
        }

        buildHelpers();
        startNewMission();
    </script>
</body>
</html>
