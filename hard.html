<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Складний рівень V2 - Кріпто-тренажер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-dark: #0369a1;
            --text: #f1f5f9;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 16px; min-height: 100vh;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 10px; background: var(--card-bg); border-radius: 12px;
        }

        .mission-box {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent);
            border-radius: 12px; padding: 16px; margin-bottom: 20px;
            font-style: italic; line-height: 1.4; font-size: 14px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px; padding: 20px; width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        h2 { text-align: center; color: var(--accent); margin-top: 0; font-size: 20px; }

        .step-container {
            border-left: 2px solid var(--accent);
            padding-left: 15px; margin-bottom: 20px; position: relative;
            transition: 0.3s;
        }

        .step-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; opacity: 0.7; margin-bottom: 5px; }
        
        input[type="text"] {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #334155;
            color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn {
            background: var(--accent); color: #fff; border: none;
            border-radius: 10px; padding: 12px; width: 100%;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            margin-top: 10px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #475569; cursor: not-allowed; }

        .validation-msg { font-size: 12px; margin-top: 5px; font-weight: bold; min-height: 18px; }
        .text-success { color: var(--success); }
        .text-error { color: var(--error); }

        #timer { font-weight: bold; color: var(--accent); }
        .lives { color: var(--error); font-weight: bold; }

        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body>

    <div id="game-screen" class="screen active">
        <div class="header">
            <span class="lives">❤️ <span id="lives-count">3</span></span>
            <span style="font-weight: bold;">Складний рівень (V2)</span>
            <span>⏱️ <span id="timer">03:00</span></span>
        </div>

        <div id="mission-text" class="mission-box">Завантаження...</div>

        <div class="card">
            <h2 id="mission-title">Місія</h2>
            
            <div class="input-group">
                <label>Зашифроване повідомлення:</label>
                <div id="cipher-text" style="font-size: 22px; font-weight: bold; letter-spacing: 3px; text-align: center; margin: 15px 0; color: var(--accent);">---</div>
            </div>

            <div id="step-1-ui" class="step-container">
                <div class="step-title" id="step1-label">Крок 1: ???</div>
                <div class="input-group">
                    <label>Результат (зніміть останній шифр):</label>
                    <input type="text" id="step1-input" placeholder="Впишіть результат...">
                </div>
                <button id="step1-btn" class="btn" onclick="validateStep(1)">Перевірити крок 1</button>
                <div id="step1-msg" class="validation-msg"></div>
            </div>

            <div id="step-2-ui" class="step-container" style="opacity: 0.3; pointer-events: none;">
                <div class="step-title" id="step2-label">Крок 2: ???</div>
                <div class="input-group">
                    <label>Результат (фінальне слово):</label>
                    <input type="text" id="step2-input" placeholder="Впишіть фінальне слово..." disabled>
                </div>
                <button id="step2-btn" class="btn" onclick="validateStep(2)" disabled>Перевірити крок 2</button>
                <div id="step2-msg" class="validation-msg"></div>
            </div>

            <button id="next-btn" class="btn" style="display:none; background: var(--success);" onclick="startNewMission()">НАСТУПНА МІСІЯ</button>
        </div>
    </div>

    <script>
        const ALPHABET = "абвгґдеєжзиіїйклмнопрстуфхцчшщьюя";
        const WORDS = ["БЛОКЧЕЙН", "АЛГОРИТМИ", "ТЕХНОЛОГІЇ", "ПРОТОКОЛ", "ДЕШИФРАТОР", "КІБЕРПРОСТІР"];
        
        let gameState = {
            currentIdx: 0,
            lives: 3,
            timeLeft: 180,
            timer: null,
            correct1: "",
            correct2: ""
        };

        const MISSIONS = [
            { steps: ["vigenere", "atbash"], key: "КОД", desc: "Повідомлення зашифровано ключем КОД, а потім віддзеркалено (Атбаш). Спочатку зніми Атбаш!" },
            { steps: ["atbash", "caesar"], shift: 5, desc: "Спочатку Атбаш, потім зсув Цезаря (+5). Дійте у зворотному порядку!" },
            { steps: ["caesar", "vigenere"], key: "ТРИЗУБ", shift: 3, desc: "Зсув +3 та ключ ТРИЗУБ. Поверни текст до оригіналу." }
        ];

        function runAtbash(t) {
            return t.toLowerCase().split('').map(c => {
                let i = ALPHABET.indexOf(c);
                return i < 0 ? c : ALPHABET[ALPHABET.length - 1 - i];
            }).join('').toUpperCase();
        }

        function runCaesar(t, s) {
            return t.toLowerCase().split('').map(c => {
                let i = ALPHABET.indexOf(c);
                if (i < 0) return c;
                let ni = (i + s) % ALPHABET.length;
                if (ni < 0) ni += ALPHABET.length;
                return ALPHABET[ni];
            }).join('').toUpperCase();
        }

        function runVigenere(t, k, decrypt = false) {
            let res = "";
            let ki = 0;
            const text = t.toLowerCase();
            const key = k.toLowerCase();
            for (let i = 0; i < text.length; i++) {
                let ti = ALPHABET.indexOf(text[i]);
                if (ti < 0) { res += text[i]; continue; }
                let k_char_i = ALPHABET.indexOf(key[ki % key.length]);
                let ni = decrypt ? (ti - k_char_i) : (ti + k_char_i);
                ni = ni % ALPHABET.length;
                if (ni < 0) ni += ALPHABET.length;
                res += ALPHABET[ni];
                ki++;
            }
            return res.toUpperCase();
        }

        function startNewMission() {
            const m = MISSIONS[gameState.currentIdx % MISSIONS.length];
            const word = WORDS[Math.floor(Math.random() * WORDS.length)];
            
            // Шифрування: Step 0 -> Step 1
            let stage1 = word;
            if (m.steps[0] === "vigenere") stage1 = runVigenere(word, m.key);
            if (m.steps[0] === "atbash") stage1 = runAtbash(word);
            if (m.steps[0] === "caesar") stage1 = runCaesar(word, m.shift);

            let stage2 = stage1;
            if (m.steps[1] === "vigenere") stage2 = runVigenere(stage1, m.key);
            if (m.steps[1] === "atbash") stage2 = runAtbash(stage1);
            if (m.steps[1] === "caesar") stage2 = runCaesar(stage1, m.shift);

            // Дешифрування: Correct1 має скасувати Step 1
            gameState.correct1 = stage1;
            gameState.correct2 = word;

            // Debug logs
            console.log("--- НОВА МІСІЯ ---");
            console.log("Фінальне слово:", word);
            console.log("Результат Кроку 1 (що вводити):", stage1);
            console.log("Зашифровано:", stage2);

            document.getElementById('mission-title').textContent = `Місія ${gameState.currentIdx + 1}`;
            document.getElementById('mission-text').textContent = m.desc;
            document.getElementById('cipher-text').textContent = stage2;
            
            document.getElementById('step1-label').textContent = `Крок 1: Скасувати ${m.steps[1].toUpperCase()}`;
            document.getElementById('step2-label').textContent = `Крок 2: Скасувати ${m.steps[0].toUpperCase()}`;

            resetUI();
            startTimer();
        }

        function validateStep(n) {
            const input = document.getElementById(`step${n}-input`);
            const msg = document.getElementById(`step${n}-msg`);
            const val = input.value.trim().toUpperCase();
            const target = (n === 1) ? gameState.correct1 : gameState.correct2;

            if (val === target) {
                msg.textContent = "✅ Правильно!";
                msg.className = "validation-msg text-success";
                input.disabled = true;
                document.getElementById(`step${n}-btn`).disabled = true;
                if (n === 1) {
                    document.getElementById('step-2-ui').style.opacity = "1";
                    document.getElementById('step-2-ui').style.pointerEvents = "all";
                    document.getElementById('step2-input').disabled = false;
                    document.getElementById('step2-btn').disabled = false;
                } else {
                    document.getElementById('next-btn').style.display = "block";
                    gameState.currentIdx++;
                }
            } else {
                gameState.lives--;
                document.getElementById('lives-count').textContent = gameState.lives;
                msg.textContent = "❌ Неправильно!";
                msg.className = "validation-msg text-error";
                if (gameState.lives <= 0) location.reload();
            }
        }

        function resetUI() {
            document.getElementById('step1-input').value = "";
            document.getElementById('step1-input').disabled = false;
            document.getElementById('step1-btn').disabled = false;
            document.getElementById('step1-msg').textContent = "";
            document.getElementById('step-2-ui').style.opacity = "0.3";
            document.getElementById('step2-input').value = "";
            document.getElementById('step2-input').disabled = true;
            document.getElementById('step2-btn').disabled = true;
            document.getElementById('step2-msg').textContent = "";
            document.getElementById('next-btn').style.display = "none";
        }

        function startTimer() {
            clearInterval(gameState.timer);
            gameState.timeLeft = 180;
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                let m = Math.floor(gameState.timeLeft / 60);
                let s = gameState.timeLeft % 60;
                document.getElementById('timer').textContent = `${m}:${s < 10 ? '0'+s : s}`;
                if (gameState.timeLeft <= 0) location.reload();
            }, 1000);
        }

        startNewMission();
    </script>
</body>
</html>
