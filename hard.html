<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Складний рівень - Кріпто-тренажер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --success: #22c55e;
            --error: #ef4444;
            --gold: #fbbf24;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 12px; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 10px 15px; background: var(--card-bg); border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .mission-box {
            background: rgba(56, 189, 248, 0.05); border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 12px; padding: 12px; margin-bottom: 15px;
            font-size: 13px; line-height: 1.4; color: #cbd5e1;
        }

        .card {
            background: var(--card-bg); border-radius: 16px; padding: 20px; width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); position: relative;
        }

        .cipher-display {
            background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 10px;
            text-align: center; border: 1px dashed var(--accent); margin-bottom: 20px;
        }

        .cipher-word { font-size: 22px; font-weight: 800; letter-spacing: 3px; color: var(--accent); }

        .helper-section {
            background: rgba(0, 0, 0, 0.2); border-radius: 8px; padding: 10px;
            margin-bottom: 15px; font-family: monospace; font-size: 11px; overflow-x: auto;
        }

        .alphabet-grid {
            display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; text-align: center;
        }

        .letter-box { border: 1px solid #334155; border-radius: 4px; padding: 2px; }
        .letter-idx { color: var(--accent); display: block; font-size: 9px; }

        .step-container {
            border-left: 3px solid #334155; padding-left: 15px; margin-bottom: 20px;
            opacity: 0.5; transition: 0.3s;
        }

        .step-container.active { border-left-color: var(--accent); opacity: 1; }

        input[type="text"] {
            width: 100%; background: #0f172a; border: 1px solid #334155;
            color: #fff; padding: 12px; border-radius: 8px; font-size: 16px;
            text-transform: uppercase; outline: none;
        }

        .btn {
            background: var(--accent); color: #fff; border: none; border-radius: 10px;
            padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .btn:disabled { background: #475569; opacity: 0.5; }
        .btn-success { background: var(--success); }
        .btn-secondary { background: #334155; margin-top: 10px; }

        .validation-msg { font-size: 12px; margin-top: 5px; min-height: 18px; }
        .text-success { color: var(--success); }
        .text-error { color: var(--error); }

        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }

        .atbash-row { display: flex; justify-content: space-around; border-bottom: 1px solid #1e293b; padding: 2px 0; }
    </style>
</head>
<body>

    <div id="game-screen" class="screen active">
        <div class="header">
            <span>❤️ <span id="lives-count">3</span></span>
            <span style="color: var(--accent);">МІСІЯ <span id="mission-num">1</span></span>
            <span>⏱️ <span id="timer">05:00</span></span>
        </div>

        <div id="mission-text" class="mission-box">...</div>

        <div class="card">
            <div class="cipher-display">
                <div id="cipher-text" class="cipher-word">---</div>
            </div>

            <div class="helper-section">
                <div id="alphabet-helper" class="alphabet-grid"></div>
            </div>

            <div id="atbash-helper" class="helper-section" style="display:none;">
                <div id="atbash-grid"></div>
            </div>

            <div id="step-1-ui" class="step-container active">
                <div class="step-title">Крок 1: <span id="step1-name">ШИФР</span></div>
                <input type="text" id="step1-input" placeholder="Розшифруйте..." autocomplete="off">
                <button id="step1-btn" class="btn" onclick="validateStep(1)">Перевірити</button>
                <div id="step1-msg" class="validation-msg"></div>
            </div>

            <div id="step-2-ui" class="step-container">
                <div class="step-title">Крок 2: <span id="step2-name">ШИФР</span></div>
                <input type="text" id="step2-input" placeholder="Фінальне слово..." disabled autocomplete="off">
                <button id="step2-btn" class="btn" onclick="validateStep(2)" disabled>Перевірити</button>
                <div id="step2-msg" class="validation-msg"></div>
            </div>

            <button id="next-btn" class="btn btn-success" style="display:none;" onclick="startNewMission()">НАСТУПНА МІСІЯ</button>
            <button class="btn btn-secondary" onclick="exitToMenu()">ВИЙТИ В МЕНЮ</button>
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="card" style="text-align: center;">
            <h1 id="final-title">ГРУ ЗАВЕРШЕНО</h1>
            <div style="font-size: 32px; color: var(--gold); margin: 20px 0;">⭐️ <span id="earned-stars">0</span></div>
            <button class="btn" onclick="location.reload()">ГРАТИ ЗНОВУ</button>
            <button class="btn btn-secondary" onclick="exitToMenu()">В ГОЛОВНЕ МЕНЮ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const ALPHABET = "абвгґдеєжзиіїйклмнопрстуфхцчшщьюя";
        const WORDS = ["БЛОКЧЕЙН", "АЛГОРИТМ", "ПРОТОКОЛ", "СИСТЕМА", "ПАРОЛЬ", "ЗАХИСТ", "МЕРЕЖА", "ТЕХНОЛОГІЯ", "ІНТЕРНЕТ"];
        
        const MISSIONS = [
            {
                text: "Ворожий штаб змінив кодування. Спочатку Віженер (КЛЮЧ), потім Атбаш. Зніми Атбаш першим!",
                steps: ["atbash", "vigenere"],
                vigenereKey: "КЛЮЧ"
            },
            {
                text: "Сигнал викривлений: зсув +5 (Цезар), потім Атбаш. Поверни текст!",
                steps: ["atbash", "caesar"],
                shift: 5
            },
            {
                text: "Критична помилка: зсув Віженера (КЛЮЧ) і Цезаря (+3). Віднови дані!",
                steps: ["caesar", "vigenere"],
                shift: 3,
                vigenereKey: "КЛЮЧ"
            }
        ];

        let state = { 
            missionIdx: 0, 
            lives: 3, 
            stars: 0, 
            timeLeft: 300, 
            timer: null, 
            correct1: "", 
            correct2: "" 
        };

        function runAtbash(text) {
            return text.toLowerCase().split('').map(c => {
                let i = ALPHABET.indexOf(c);
                return i < 0 ? c : ALPHABET[ALPHABET.length - 1 - i];
            }).join('').toUpperCase();
        }

        function runCaesar(text, shift) {
            return text.toLowerCase().split('').map(c => {
                let i = ALPHABET.indexOf(c);
                if (i < 0) return c;
                let ni = (i + shift) % ALPHABET.length;
                if (ni < 0) ni += ALPHABET.length;
                return ALPHABET[ni];
            }).join('').toUpperCase();
        }

        function runVigenere(text, key, decrypt = false) {
            let res = "";
            let kIdx = 0;
            const t = text.toLowerCase();
            const k = key.toLowerCase();
            for(let i=0; i<t.length; i++) {
                let ti = ALPHABET.indexOf(t[i]);
                if(ti < 0) { res += t[i]; continue; }
                let ki = ALPHABET.indexOf(k[kIdx % k.length]);
                let ni = decrypt ? (ti - ki) : (ti + ki);
                ni = ni % ALPHABET.length;
                if(ni < 0) ni += ALPHABET.length;
                res += ALPHABET[ni];
                kIdx++;
            }
            return res.toUpperCase();
        }

        function buildHelpers() {
            const grid = document.getElementById('alphabet-helper');
            grid.innerHTML = ALPHABET.split('').map((l, i) => 
                `<div class="letter-box"><span class="letter-idx">${i}</span>${l.toUpperCase()}</div>`
            ).join('');

            const atbashGrid = document.getElementById('atbash-grid');
            let r1 = ALPHABET.slice(0, 11).toUpperCase();
            let r2 = ALPHABET.slice(0, 11).split('').map(l => runAtbash(l)).join('').toUpperCase();
            
            atbashGrid.innerHTML = `
                <div style="opacity: 0.7; margin-bottom: 5px;">Атбаш (А ↔ Я):</div>
                <div class="atbash-row">${r1.split('').map(l => `<span>${l}</span>`).join('')}</div>
                <div class="atbash-row" style="color:var(--accent)">${r2.split('').map(l => `<span>${l}</span>`).join('')}</div>
            `;
        }

        function startNewMission() {
            if (state.missionIdx >= MISSIONS.length) return gameOver(true);
            const m = MISSIONS[state.missionIdx];
            const word = WORDS[Math.floor(Math.random() * WORDS.length)];
            
            let encrypted = word;
            [...m.steps].reverse().forEach(s => {
                if(s === "atbash") encrypted = runAtbash(encrypted);
                if(s === "caesar") encrypted = runCaesar(encrypted, m.shift);
                if(s === "vigenere") encrypted = runVigenere(encrypted, m.vigenereKey, false);
            });

            let s1 = encrypted;
            if(m.steps[0] === "atbash") s1 = runAtbash(s1);
            if(m.steps[0] === "caesar") s1 = runCaesar(s1, -m.shift);
            if(m.steps[0] === "vigenere") s1 = runVigenere(s1, m.vigenereKey, true);
            
            state.correct1 = s1;
            state.correct2 = word;

            document.getElementById('mission-num').textContent = state.missionIdx + 1;
            document.getElementById('mission-text').innerHTML = m.text;
            document.getElementById('cipher-text').textContent = encrypted;
            document.getElementById('step1-name').textContent = m.steps[0].toUpperCase();
            document.getElementById('step2-name').textContent = m.steps[1].toUpperCase();
            document.getElementById('atbash-helper').style.display = m.steps.includes('atbash') ? 'block' : 'none';

            resetUI();
            startTimer();
        }

        function resetUI() {
            document.getElementById('step1-input').value = "";
            document.getElementById('step1-input').disabled = false;
            document.getElementById('step1-btn').disabled = false;
            document.getElementById('step1-msg').textContent = "";
            
            document.getElementById('step2-input').value = "";
            document.getElementById('step2-input').disabled = true;
            document.getElementById('step2-btn').disabled = true;
            document.getElementById('step2-msg').textContent = "";

            document.getElementById('step-1-ui').classList.add('active');
            document.getElementById('step-2-ui').classList.remove('active');
            document.getElementById('next-btn').style.display = 'none';
        }

        function validateStep(n) {
            const input = document.getElementById(`step${n}-input`);
            const val = input.value.trim().toUpperCase();
            const target = (n === 1) ? state.correct1 : state.correct2;
            const msg = document.getElementById(`step${n}-msg`);

            if (val === target) {
                msg.textContent = "✅ Вірно!";
                msg.className = "validation-msg text-success";
                
                if (n === 1) {
                    state.stars += 5;
                    syncStars(5);
                    input.disabled = true;
                    document.getElementById('step1-btn').disabled = true;
                    document.getElementById('step2-input').disabled = false;
                    document.getElementById('step2-btn').disabled = false;
                    document.getElementById('step-2-ui').classList.add('active');
                    document.getElementById('step-1-ui').classList.remove('active');
                } else {
                    state.stars += 5;
                    syncStars(5);
                    if(state.timer) clearInterval(state.timer);
                    state.missionIdx++;
                    input.disabled = true;
                    document.getElementById('step2-btn').disabled = true;

                    if (state.missionIdx >= MISSIONS.length) {
                        setTimeout(() => gameOver(true), 1000);
                    } else {
                        document.getElementById('next-btn').style.display = 'block';
                    }
                }
            } else {
                state.lives--;
                document.getElementById('lives-count').textContent = state.lives;
                msg.textContent = "❌ Помилка!";
                msg.className = "validation-msg text-error";
                if(state.lives <= 0) gameOver(false);
            }
        }

        function startTimer() {
            if(state.timer) clearInterval(state.timer);
            state.timeLeft = 300;
            state.timer = setInterval(() => {
                if(state.timeLeft <= 0) {
                    handleTimeout();
                } else {
                    state.timeLeft--;
                    let m = Math.floor(state.timeLeft / 60);
                    let s = state.timeLeft % 60;
                    document.getElementById('timer').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function handleTimeout() {
            state.lives--;
            document.getElementById('lives-count').textContent = state.lives;
            
            if(state.lives > 0) {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                startNewMission();
            } else {
                gameOver(false);
            }
        }

        function gameOver(victory) {
            if(state.timer) clearInterval(state.timer);
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('game-over-screen').classList.add('active');
            document.getElementById('earned-stars').textContent = state.stars;
            
            const title = document.getElementById('final-title');
            if(victory) {
                title.textContent = "ПЕРЕМОГА!";
                title.style.color = "var(--success)";
            } else {
                title.textContent = "ГРУ ЗАВЕРШЕНО";
                title.style.color = "var(--error)";
            }
        }

        function exitToMenu() {
            window.location.href = 'index.html';
        }

        async function syncStars(amount) {
            const userId = tg.initDataUnsafe?.user?.id || 0;
            try {
                await fetch(`https://anyway-art-mustard.ngrok-free.dev/update_stars`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, stars: amount })
                });
            } catch(e) {}
        }

        buildHelpers();
        startNewMission();
    </script>
</body>
</html>
